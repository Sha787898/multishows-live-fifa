    <style>

        html, body { background: #000; height: 100%; width: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }

            overflow: hidden !important;

        .shaka-bottom-controls {
            padding: 0 calc(16px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left)) !important;
        }

        .shaka-play-button-container, .shaka-scrim-container {

        .video-watermark:hover span { color: #fff; }
        
        .top-left-panel {

        #lockBtn, #fitScreenBtn { display: none; }
        .is-fullscreen #lockBtn, .is-fullscreen #fitScreenBtn { display: flex; }
        
        .player-locked #lockBtn { 
            position: absolute !important; 
            top: calc(12px + env(safe-area-inset-top)) !important; 
            left: calc(12px + env(safe-area-inset-left)) !important; 
            z-index: 210 !important; background: transparent !important; border: none !important; color: rgba(255, 255, 255, 0.2) !important; width: 20px !important; height: 20px !important; opacity: 0.2; transform: scale(0.85); box-shadow: none !important; backdrop-filter: none !important; 
        }
        .player-locked #lockBtn.touch-active { opacity: 0.6; color: rgba(255, 255, 255, 0.8) !important; }
        .player-locked .top-left-panel > button:not(#lockBtn) { display: none !important; }
        .player-locked .shaka-controls-container { display: none !important; pointer-events: none !important; }
        .player-locked .video-watermark { display: none !important; }
        .player-locked .cool-play-overlay { display: none !important; }
        .player-locked #infoPopup { display: none !important; }
        
        .server-popup, .quality-popup { position: absolute; top: calc(42px + env(safe-area-inset-top)); left: calc(12px + env(safe-area-inset-left)); background: rgba(12, 12, 12, 0.96); backdrop-filter: blur(6px); border: 1px solid rgba(225, 29, 72, 0.3); border-radius: 8px; padding: 6px; display: none; flex-direction: column; gap: 4px; width: 155px; z-index: 101; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }

        .info-wrapper { border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 6px; margin-top: 4px; }
        
        .toggle-btn, .info-toggle-btn { width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: #ccc; font-size: 9px; font-weight: 700; padding: 5px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: all 0.2s; }

        .server-popup button.server-item-btn:hover, .quality-popup button.quality-item-btn:hover { background: rgba(225, 29, 72, 0.1); color: #fff; }
        .server-popup button.server-item-btn.active, .quality-popup button.quality-item-btn.active { background: #E11D48; color: #fff; }
        
        .info-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(225, 29, 72, 0.4); backdrop-filter: blur(8px); border-radius: 12px; padding: 16px; display: none; flex-direction: column; gap: 10px; width: 280px; z-index: 200; box-shadow: 0 20px 50px rgba(0,0,0,0.9); color: #fff; }
        .info-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 8px; margin-bottom: 2px; }
        .info-title { font-size: 11px; font-weight: 700; color: #E11D48; letter-spacing: 0.8px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
        .info-close { background: transparent; border: none; color: #aaa; cursor: pointer; display: flex; align-items: center; }
        .info-close span { font-size: 16px; }
        .info-close:hover { color: #E11D48; }
        .info-row { display: flex; justify-content: space-between; font-size: 10.5px; font-weight: 500; color: rgba(255, 255, 255, 0.65); padding: 2px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.02); }
        .info-val { color: #fff; font-weight: 700; font-family: monospace; text-shadow: 0 0 5px rgba(255,255,255,0.1); }

        .cool-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: none; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .cool-play-btn { width: 60px; height: 60px; background: rgba(10, 10, 10, 0.8); border: 2px solid #E11D48; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; box-shadow: 0 0 20px rgba(225, 29, 72, 0.4); backdrop-filter: blur(8px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .cool-play-btn span { color: #fff; font-size: 30px; margin-left: 2px; }
        .cool-play-btn:hover { transform: scale(1.08); background: #E11D48; box-shadow: 0 0 25px rgba(225, 29, 72, 0.7); }
        
        .gesture-indicator { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 10, 0.8); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; z-index: 99; pointer-events: none; opacity: 0; transition: opacity 0.15s ease; border: 1px solid rgba(225, 29, 72, 0.25); backdrop-filter: blur(6px); }
        .custom-loader { position: absolute; top: calc(50% + 55px); left: 50%; transform: translate(-50%, -50%); z-index: 9; pointer-events: none; transition: opacity 0.3s ease; }
        .loading-text { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(6px); padding: 6px 16px; border-radius: 30px; color: #E11D48; font-size: 10.5px; font-weight: 700; letter-spacing: 0.5px; border: 1px solid rgba(225, 29, 72, 0.2); white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .shaka-volume-bar-container { display: none !important; }

        button.shaka-overflow-menu-button, button.shaka-fullscreen-button { display: inline-block !important; }
        .shaka-overflow-menu { display: none !important; }
    </style>

<body>

<script>
    let isLocked = false;
    let isPlayerFullscreen = false;
    let brightness = 100;
    let autoSwitchEnabled = true;
    let controlsVisible = true;
    let serverList = [];
    let currentServerIndex = 0;
    let fallbackTimer = null;
    let uiMasterTimer = null;
    let stealthResetTimer = null;
    const LOAD_TIMEOUT = 6000; // নেটওয়ার্ক ফেইলভার টাইমআউট কমিয়ে ৬ সেকেন্ড করা হলো যাতে অটো-সুইচ ফাস্ট হয়
    let currentFitState = 0; 
    let hlsInstance = null; 
    let player = null; 

    // Audio Context Engine
    let audioCtx = null;
    let gainNode = null;
    let compressorNode = null;
    let sourceNode = null;
    let audioBoostMultiplier = 1.0; 

    function initAudioBoostEngine() {
        if (audioCtx) return;
        try {
            const video = document.getElementById('video');
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioCtx.createMediaElementSource(video);
            
            compressorNode = audioCtx.createDynamicsCompressor();
            compressorNode.threshold.setValueAtTime(-24, audioCtx.currentTime);
            compressorNode.knee.setValueAtTime(30, audioCtx.currentTime);
            compressorNode.ratio.setValueAtTime(12, audioCtx.currentTime);
            compressorNode.attack.setValueAtTime(0.003, audioCtx.currentTime);
            compressorNode.release.setValueAtTime(0.25, audioCtx.currentTime);

            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);

            sourceNode.connect(compressorNode);
            compressorNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        } catch(e) {
            console.error("Audio Context Blocked:", e);
        }
    }

    function setAudioBoostLevel(multiplier) {
        initAudioBoostEngine();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (gainNode) {
            audioBoostMultiplier = Math.max(1.0, Math.min(3.0, multiplier));
            gainNode.gain.setValueAtTime(audioBoostMultiplier, audioCtx.currentTime);
        }
    }

    async function fetchSecureServers() {
        try {
            const response = await fetch('https://solitary-meadow-ecemultishows-api.shabidalhasan.workers.dev/?t=' + new Date().getTime(), { 
                method: 'GET',
                headers: {
                    'X-MultiShows-Auth': 'Premium-Streaming-MS-2026',
                    'Accept': 'application/json'
                }
            });
            if (!response.ok) throw new Error('Handshake Failed');
            const rawData = await response.json();
            if(rawData && rawData.match_1 && rawData.match_1.servers) {
                serverList = rawData.match_1.servers;
                return true;
            } else {
                throw new Error('Format Error');
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('statusText').innerText = "CONNECTION ERROR. RETRYING...";
            return false;
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById('video');
        const container = document.getElementById('playerContainer');
        const loader = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const lockBtn = document.getElementById('lockBtn');
        const lockIcon = document.getElementById('lockIcon');
        const customFullscreenBtn = document.getElementById('customFullscreenBtn');
        const fsIcon = document.getElementById('fsIcon');
        const telegramLink = document.getElementById('telegramLink');
        const topLeftPanel = document.getElementById('topLeftPanel');
        const serverMenuBtn = document.getElementById('serverMenuBtn');
        const serverPopup = document.getElementById('serverPopup');
        const serverListWrapper = document.getElementById('serverListWrapper');
        const qualityMenuBtn = document.getElementById('qualityMenuBtn');
        const qualityPopup = document.getElementById('qualityPopup');
        const qualityListWrapper = document.getElementById('qualityListWrapper');
        const currentQualityLabel = document.getElementById('currentQualityLabel');
        const autoSwitchToggle = document.getElementById('autoSwitchToggle');
        const currentServerLabel = document.getElementById('currentServerLabel');
        const coolPlayOverlay = document.getElementById('coolPlayOverlay');
        const coolPlayBtn = document.getElementById('coolPlayBtn');
        const coolPlayIcon = document.getElementById('coolPlayIcon');
        const infoToggleBtn = document.getElementById('infoToggleBtn');
        const infoPopup = document.getElementById('infoPopup');
        const infoCloseBtn = document.getElementById('infoCloseBtn');
        const fitScreenBtn = document.getElementById('fitScreenBtn');
        const fitScreenLabel = document.getElementById('fitScreenLabel');

        player = new shaka.Player(video);
        
        player.getNetworkingEngine().registerRequestFilter(function(type, request) {
            if (type == shaka.net.NetworkingEngine.RequestType.LICENSE || request.uris[0].includes('cloudflare')) {
                request.headers['Origin'] = window.location.origin;
                request.headers['X-Requested-With'] = 'XMLHttpRequest';
                request.allowCrossRedditCredentials = true;
            }
        });
        
        // --- 🚀 সুপার স্মুথ বাফারিং এবং প্লেব্যাক কনফিগারেশন ---
        // লো-ল্যাটেন্সি লজিক্যাল কনফ্লিক্ট দূর করা হয়েছে এবং প্রিমিয়াম ওড ইন্টারনাল বাফারিং রুলস দেওয়া হয়েছে
        player.configure({
            streaming: { 
                lowLatencyMode: false, // এটি ফলস করা হয়েছে যাতে বাফারিং ইঞ্জিনের সাথে কোনো কনফ্লিক্ট না হয়
                bufferingGoal: 12,     // অন্য সাইটের মতো এখানে ১২ সেকেন্ড করা হয়েছে, ৪৫ সেকেন্ডের জ্যাম দূর হবে!
                rebufferingGoal: 2.5,   // ২.৫ সেকেন্ড লোড হলেই ভিডিও ইনস্ট্যান্টলি প্লেব্যাক রিজিউম করবে
                bufferBehind: 15, 
                ignoreDeviceCapability: true,
                alwaysKeepInSync: true,
                stallThreshold: 1.0,   // সামান্য সিগন্যাল ওঠানামায় ভিডিও আর হুট করে আটকে 'BUFFERING' দেখাবে না
                retryParameters: { maxAttempts: 5, baseDelay: 1000, backoffFactor: 1.5, timeout: 5000 }
            },
            manifest: { dash: { ignoreMinBufferTime: true, multiTypeVariantsAllowed: true }, disableVideo: false },
            abr: { 
                enabled: true, 
                defaultBandwidthEstimate: 3500000, // একটি অপ্টিমাইজড মিড-রেঞ্জ ব্যান্ডউইথ দিয়ে শুরু হবে যাতে ফার্স্ট প্লে ইনস্ট্যান্ট হয়
                switchInterval: 4
            } 
        });

        player.addEventListener('trackschanged', generateQualityMenu);
        player.addEventListener('variantchanged', updateActiveQualityButton);

        function generateQualityMenu() {
            qualityListWrapper.innerHTML = '';
            if (hlsInstance) {
                const levels = hlsInstance.levels;
                if(levels && levels.length > 0) {
                    const autoBtn = document.createElement('button');
                    autoBtn.className = 'quality-item-btn';
                    autoBtn.id = 'hls-quality-auto';
                    autoBtn.innerText = 'Auto (Adaptive)';
                    if(hlsInstance.currentLevel === -1) autoBtn.classList.add('active');

        window.getSafeServerIndex = function (currentServerIndex) {
            let nextIndex = parseInt(currentServerIndex, 10);

        };

        async function loadServer(index) {
            if (!serverList || serverList.length === 0) return;
            let safeIdx = window.getSafeServerIndex(index);
            if (safeIdx >= serverList.length) safeIdx = 0;
            currentServerIndex = safeIdx;
            const currentServer = serverList[currentServerIndex];
            currentServerLabel.innerText = currentServer.name;

            statusText.innerText = `CONNECTING ${currentServer.name}...`;
            loader.style.opacity = '1';
            
            if (autoSwitchEnabled) startFallbackTimer();

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            try {
                await player.unload(); 
            } catch(e){}

            const streamUrl = currentServer.url;

            if (streamUrl.includes('.ts') || streamUrl.includes('.m3u8')) {
                currentQualityLabel.innerText = 'HLS Live';
                if (Hls.isSupported()) {
                    // --- ⚡ Hls.js ইঞ্জিন ও ব্যান্ডউইথ অপ্টিমাইজেশন ---
                    hlsInstance = new Hls({ 
                        maxBufferSize: 60 * 1024 * 1024, // ৬০ মেগাবাইটে আপগ্রেড করা হয়েছে স্মুথ ড্রপের জন্য
                        maxBufferLength: 20, 
                        liveSyncDurationCount: 3,
                        enableWorker: true,
                        lowLatencyMode: false, // ল্যাগিং কমাতে ও বাফার সলিড রাখতে ফলস করা হয়েছে
                        abrEwmaDefaultEstimate: 15000000, 
                        appendErrorMaxRetry: 5
                    });
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        loader.style.opacity = '0'; 
                        stopFallbackTimer();
                        video.play().catch(() => {
                            video.play().catch(()=>{});
                        });
                        generateQualityMenu();
                    });
                    hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal && autoSwitchEnabled) handleStreamFailure();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                }
            } else {
                try {
                    player.configure({ drm: { clearKeys: currentServer.clearKeys } });
                    await player.load(streamUrl);
                    loader.style.opacity = '0';
                    stopFallbackTimer();
                    video.play().catch(() => {
                        video.play().catch(()=>{});
                    });
                } catch (error) {
                    if (autoSwitchEnabled) handleStreamFailure();
                }
            }
            renderServerPopup();
        }

        function startFallbackTimer() {
            if(!autoSwitchEnabled) return;
            clearTimeout(fallbackTimer);
            fallbackTimer = setTimeout(() => { handleStreamFailure(); }, LOAD_TIMEOUT);
        }

        function stopFallbackTimer() { clearTimeout(fallbackTimer); }

        function handleStreamFailure() {
            stopFallbackTimer();
            if (!autoSwitchEnabled) { statusText.innerText = "BUFFERING..."; return; }
            let safeCurrent = window.getSafeServerIndex(currentServerIndex);
            let nextIndex = (safeCurrent + 1) % serverList.length;
            statusText.innerHTML = `<span style='color:#E11D48;'>TIMEOUT! SWITCHING SERVER...</span>`;
            loader.style.opacity = '1';
            setTimeout(() => { loadServer(nextIndex); }, 1200);
        }

        // --- 🎯 প্রটেক্টেড টাচ এরিয়া ও জেসচার লজিক ---
        let startX, startY, startVol, startBright, startGain;
        let osdTimeout;
        let lastTapTime = 0;
        let isMoving = false;
        const TOUCH_THRESHOLD = 40; // মিস-টাচ রুখতে থ্রেশহোল্ড বাড়ানো হয়েছে

        function showOSD(icon, value) {
            gIcon.innerText = icon;
            gValue.innerText = value;
            gOsd.style.opacity = '1';
            clearTimeout(osdTimeout);
            osdTimeout = setTimeout(() => { gOsd.style.opacity = '0'; }, 800);

        container.addEventListener('touchstart', (e) => {
            const now = Date.now();
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;
            
            if (touchY < rect.height * 0.15 || touchY > rect.height * 0.85) {
                isMoving = false;
                return; 
            }
            
            // ডাবল ট্যাপ অ্যাকশন কেবল বাম ও ডান পাশের ৩৫% কলামে সীমাবদ্ধ (মাঝখানের ৩০% সুরক্ষিত)
            if (now - lastTapTime < 250 && !isLocked) {
                if (touchX < rect.width * 0.35 || touchX > rect.width * 0.65) {
                    e.preventDefault();
                    if (touchX > rect.width / 2) {
                        video.currentTime = Math.min(video.duration, video.currentTime + 10);
                        showOSD('fast_forward', '+10s');
                    } else {
                        video.currentTime = Math.max(0, video.currentTime - 10);
                        showOSD('fast_rewind', '-10s');
                    }
                    lastTapTime = 0; 
                    isMoving = false;
                    return;
                }
            }
            lastTapTime = now;

            if (!isPlayerFullscreen || isLocked || serverPopup.style.display === 'flex' || qualityPopup.style.display === 'flex' || infoPopup.style.display === 'flex') return;
            
            startX = touch.clientX;
            startY = touch.clientY;
            startVol = video.volume;
            startBright = brightness;
            isMoving = false;
            
            initAudioBoostEngine();
            startGain = gainNode ? gainNode.gain.value : 1.0;
            
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            resetMasterTimer();
        });

        container.addEventListener('touchmove', (e) => {
            if (!isPlayerFullscreen || isLocked || serverPopup.style.display === 'flex' || qualityPopup.style.display === 'flex' || infoPopup.style.display === 'flex') return;
            
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;
            
            if (touchY < rect.height * 0.15 || touchY > rect.height * 0.85) return;
            
            // মাঝখানের ৩০% এরিয়া লকড (কোনো ভুল জেসচার ভলিউম/ব্রাইটনেস ট্রিগার করবে না)
            if (touchX >= rect.width * 0.35 && touchX <= rect.width * 0.65) {
                return; 
            }
            
            const deltaX = Math.abs(touch.clientX - startX);
            const deltaY = startY - touch.clientY;
            
            if (!isMoving && Math.abs(deltaY) < TOUCH_THRESHOLD && deltaX < TOUCH_THRESHOLD) {
                return; 
            }
            isMoving = true; 

            const sensitivity = 0.12; 
            
            if (touchX < rect.width * 0.35) {
                // 🌗 বাম ৩৫%: ব্রাইটনেস
                let newBright = startBright + (deltaY * sensitivity * 2);
                newBright = Math.max(10, Math.min(100, newBright));
                brightness = newBright;
                bOverlay.style.opacity = (100 - brightness) / 100 * 0.85;
                showOSD('brightness_6', Math.round(brightness) + '%');
            } else if (touchX > rect.width * 0.65) {
                // 🔊 ডান ৩৫%: ভলিউম ও প্রো-বুস্টার
                if (deltaY <= 0) {
                    if (startGain > 1.01) {
                        let calculatedGain = startGain + (deltaY * sensitivity / 20);
                        let targetBoost = Math.max(1.0, Math.min(3.0, calculatedGain));
                        setAudioBoostLevel(targetBoost);
                        if (targetBoost <= 1.02) {
                            showOSD('volume_up', '100%');
                        } else {
                            showOSD('volume_up', `Boost ${Math.round(targetBoost * 100)}% 🚀`);
                        }
                    } else {
                        setAudioBoostLevel(1.0);
                        let newVol = startVol + (deltaY * sensitivity / 25);
                        newVol = Math.max(0, Math.min(1, newVol));
                        video.volume = newVol;
                        showOSD(newVol <= 0.02 ? 'volume_off' : 'volume_up', Math.round(newVol * 100) + '%');
                    }
                } else if (deltaY > 0) {
                    if (startVol < 0.98) {
                        let newVol = startVol + (deltaY * sensitivity / 25);
                        video.volume = Math.min(1, newVol);
                        setAudioBoostLevel(1.0);
                        showOSD('volume_up', Math.round(video.volume * 100) + '%');
                    } else {
                        video.volume = 1.0;
                        let calculatedGain = startGain + (deltaY * sensitivity / 20);
                        let targetBoost = Math.max(1.0, Math.min(3.0, calculatedGain));
                        setAudioBoostLevel(targetBoost);
                        showOSD('volume_up', `Boost ${Math.round(targetBoost * 100)}% 🚀`);
                    }
                }
            }
            resetMasterTimer();
        });

        container.addEventListener('touchend', (e) => {
            if (!isMoving && Date.now() - lastTapTime < 150) {
                if (isLocked) { showAllControls(); return; }
                if (e.target.closest('#topLeftPanel') || e.target.closest('#serverPopup') || e.target.closest('#qualityPopup') || e.target.closest('#infoPopup') || e.target.closest('.shaka-controls-container')) {
                    return;
                }
                if (serverPopup.style.display === 'flex' || qualityPopup.style.display === 'flex' || infoPopup.style.display === 'flex') {
                    serverPopup.style.display = 'none';
                    qualityPopup.style.display = 'none';
                    infoPopup.style.display = 'none';
                    resetMasterTimer();
                    return;
                }
                if (!controlsVisible) { showAllControls(); resetMasterTimer(); } else { hideAllControls(); clearTimeout(uiMasterTimer); }
            }
        });
    });
</script>
</body>
</html>
