<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>MultiShows Premium Stream</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FMP9REY96D');
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            background: #000;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .shaka-video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            touch-action: none;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }
        #brightnessOverlay {
            position: absolute;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        .video-watermark {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 6px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            text-decoration: none !important;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .video-watermark span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-block;
        }
        .top-left-panel {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 100;
            display: flex;
            gap: 6px;
            align-items: center;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .top-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            height: 24px;
            padding: 0 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .top-btn.btn-circle {
            width: 24px;
            padding: 0;
        }
        .top-btn span.material-icons {
            font-size: 12px;
        }
        .top-btn:hover, .top-btn.active-btn {
            background: #E11D48;
            color: #fff;
            border-color: #E11D48;
        }
        #lockBtn {
            display: none;
        }
        .is-fullscreen #lockBtn {
            display: flex;
        }
        .player-locked #customFullscreenBtn, .player-locked #serverMenuBtn {
            display: none !important;
        }
        .player-locked #lockBtn {
            background: #E11D48 !important;
            border-color: #E11D48 !important;
            color: #fff;
            height: 28px;
            width: 28px;
        }
        .player-locked .shaka-controls-container {
            display: none !important;
        }
        .server-popup {
            position: absolute;
            top: 42px;
            left: 12px;
            background: rgba(15, 15, 15, 0.96);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            width: 145px;
            z-index: 101;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }
        .server-list-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 150px;
            overflow-y: auto;
        }
        .server-popup button.server-item-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            padding: 6px 10px;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .server-popup button.server-item-btn.active {
            background: #E11D48;
            color: #fff;
        }
        
        /* Shaka ডিফল্ট লার্জ প্লে বাটন চিরতরে হাইড */
        .shaka-play-button-container, .shaka-play-button {
            display: none !important;
        }
        
        /* ফিক্সড: মাঝখানের কাস্টম প্লে বাটনের আকর্ষণীয় কালার গ্লোয়িং ইফেক্ট */
        .cool-play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .cool-play-btn {
            width: 65px;
            height: 65px;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid #E11D48;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            /* আকর্ষণীয় গ্লোয়িং শ্যাডো ইফেক্ট */
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.6), inset 0 0 15px rgba(225, 29, 72, 0.3);
            backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulseGlow 2s infinite;
        }
        .cool-play-btn span {
            color: #fff;
            font-size: 32px;
            margin-left: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .cool-play-btn:hover {
            transform: scale(1.1);
            background: #E11D48;
            box-shadow: 0 0 30px rgba(225, 29, 72, 0.9);
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(225, 29, 72, 0.5); }
            50% { box-shadow: 0 0 30px rgba(225, 29, 72, 0.8); }
            100% { box-shadow: 0 0 15px rgba(225, 29, 72, 0.5); }
        }

        .gesture-indicator {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.8);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 99;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            border: 1px solid rgba(225, 29, 72, 0.25);
        }
        .custom-loader {
            position: absolute;
            top: calc(50% + 55px);
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-text {
            background: rgba(10, 10, 10, 0.85);
            padding: 6px 16px;
            border-radius: 30px;
            color: #E11D48;
            font-size: 10.5px;
            font-weight: 700;
            border: 1px solid rgba(225, 29, 72, 0.2);
        }

        /* SHAKA PLAYER UI OVERRIDE - ডাবল বার ও বাটন জটলা ফিক্স */
        .shaka-controls-container {
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%) !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-end !important;
            opacity: 1;
            transition: opacity 0.25s ease, visibility 0.25s ease !important;
        }
        
        /* শাকা কন্ট্রোল প্যানেলের ভেতরের লেআউট ফিক্স */
        .shaka-control-panel {
            display: flex !important;
            align-items: center !important;
            padding: 0 12px 10px 12px !important;
            background: transparent !important;
            height: auto !important;
        }
        
        /* ফিক্সড: ভিডিও রানিং লাইনের (Seek Bar) নিখুঁত লাল কালার স্ট্রাকচার */
        .shaka-range-container {
            margin: 0 10px !important;
            height: 12px !important;
        }
        .shaka-seek-bar-container {
            height: 4px !important;
        }
        .shaka-seek-bar-container .shaka-seek-bar-played {
            background: #E11D48 !important;
            box-shadow: 0 0 8px rgba(225, 29, 72, 0.8);
        }
        .shaka-seek-bar-container .shaka-seek-bar-unplayed {
            background: rgba(255, 255, 255, 0.2) !important;
        }
        .shaka-seek-bar-container .shaka-seek-bar-hover {
            background: rgba(255, 255, 255, 0.4) !important;
        }
        
        /* শাকার ডিফল্ট ভলিউম বার হাইড */
        .shaka-volume-bar-container {
            display: none !important;
        }
        
        /* সেটিংস মেনু স্টাইল */
        .shaka-overflow-menu, .shaka-settings-menu {
            background: rgba(12, 12, 12, 0.96) !important;
            backdrop-filter: blur(14px) !important;
            border: 1px solid rgba(225, 29, 72, 0.25) !important;
            border-radius: 12px !important;
        }
        .shaka-overflow-menu button:hover, .shaka-settings-menu button:hover {
            background: rgba(225, 29, 72, 0.22) !important;
            color: #E11D48 !important;
        }

        /* ওয়ান-ট্যাপ ফুল হাইড মেকানিজম */
        .ui-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
        .shaka-spinner-container, .shaka-spinner {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="shaka-video-container" data-shaka-player-container id="playerContainer">
        <div id="brightnessOverlay"></div>
        <a href="https://t.me/MultiShowsFUN" target="_blank" class="video-watermark" id="telegramLink">
            <span>MultiShows</span>
        </a>
        
        <div class="cool-play-overlay" id="coolPlayOverlay">
            <div class="cool-play-btn" id="coolPlayBtn">
                <span class="material-icons" id="coolPlayIcon">play_arrow</span>
            </div>
        </div>
        
        <div id="gestureOsd" class="gesture-indicator">
            <span class="material-icons" id="gestureIcon">volume_up</span>
            <span id="gestureValue">50%</span>
        </div>
        <div id="loadingOverlay" class="custom-loader">
            <div id="statusText" class="loading-text">LOADING MULTISHOWS...</div>
        </div>
        
        <video autoplay playsinline id="video" class="shaka-video" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>
        
        <div class="top-left-panel" id="topLeftPanel">
            <button class="top-btn" id="serverMenuBtn" title="Change Server">
                <span class="material-icons">dns</span>
                <span id="currentServerLabel">LOADING...</span>
            </button>
            <button class="top-btn btn-circle" id="customFullscreenBtn" title="Toggle Fullscreen">
                <span class="material-icons" id="fsIcon">fullscreen</span>
            </button>
            <button class="top-btn btn-circle" id="lockBtn" title="Lock Screen">
                <span class="material-icons" id="lockIcon">lock_open</span>
            </button>
        </div>
        
        <div class="server-popup" id="serverPopup">
            <div style="border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:6px; margin-bottom:4px;">
                <button class="top-btn style-auto" id="autoSwitchToggle" style="width:100%; font-size:9px;">
                    <span class="material-icons" style="font-size:10px;">sync</span> AUTO SWITCH: ON
                </button>
            </div>
            <div class="server-list-wrapper" id="serverListWrapper"></div>
        </div>
    </div>

    <script>
        let isLocked = false;
        let isPlayerFullscreen = false;
        let brightness = 100;
        let autoSwitchEnabled = true;
        let controlsVisible = true; 
        let serverList = [];
        let currentServerIndex = 0;
        let fallbackTimer = null;
        const LOAD_TIMEOUT = 15000;

        async function fetchSecureServers() {
            try {
                const response = await fetch('https://solitary-meadow-ecemultishows-api.shabidalhasan.workers.dev/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer MultiShowsSecureToken2026'
                    }
                });
                if (!response.ok) throw new Error('Security Handshake Failed');
                serverList = await response.json();
                return true;
            } catch (error) {
                console.error("Security Fetch Error:", error);
                document.getElementById('statusText').innerText = "SECURITY ERROR: KEY PROTECTED.";
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return;

            const video = document.getElementById('video');
            const container = document.getElementById('playerContainer');
            const loader = document.getElementById('loadingOverlay');
            const statusText = document.getElementById('statusText');
            const lockBtn = document.getElementById('lockBtn');
            const lockIcon = document.getElementById('lockIcon');
            const customFullscreenBtn = document.getElementById('customFullscreenBtn');
            const fsIcon = document.getElementById('fsIcon');
            const telegramLink = document.getElementById('telegramLink');
            const topLeftPanel = document.getElementById('topLeftPanel');
            const serverMenuBtn = document.getElementById('serverMenuBtn');
            const serverPopup = document.getElementById('serverPopup');
            const serverListWrapper = document.getElementById('serverListWrapper');
            const autoSwitchToggle = document.getElementById('autoSwitchToggle');
            const currentServerLabel = document.getElementById('currentServerLabel');
            const coolPlayOverlay = document.getElementById('coolPlayOverlay');
            const coolPlayBtn = document.getElementById('coolPlayBtn');
            const coolPlayIcon = document.getElementById('coolPlayIcon');

            const secureLoadSuccess = await fetchSecureServers();
            if (!secureLoadSuccess || serverList.length === 0) return;

            const player = new shaka.Player(video);
            
            // Shaka UI কনফিগারেশন: একদম নিখুঁত সিরিয়াল বিন্যাস
            const ui = new shaka.ui.Overlay(player, container, video);
            ui.configure({
                controlPanelElements: [
                    'play_pause',          // নিচে বামে প্লে/পজ
                    'time_and_duration',   // নিচে বামে টাইম কাউন্টার
                    'seek_bar',            // একদম মাঝে লাল রানিং ট্র্যাক লাইন
                    'mute',                // নিচে ডানে মিউট মাইক বাটন
                    'picture_in_picture',  // নিচে ডানে মিনিমাইজ (PiP) বাটন
                    'quality',             // নিচে ডানে কোয়ালিটি গিয়ার আইকন
                    'fullscreen'           // নিচে ডানে ফুলস্ক্রিন বাটন
                ],
                fadeDelay: 0 // শাকার নিজস্ব অটো-হাইড অফ করা হলো কাস্টম টগলের সুবিধার্থে
            });

            // প্রোপাগেশন ব্লক যাতে নিচের বারে ক্লিক করলে প্লেয়ার হাইড না হয়
            setTimeout(() => {
                const shakaControls = document.querySelector('.shaka-controls-container');
                if (shakaControls) {
                    shakaControls.addEventListener('click', (e) => e.stopPropagation());
                }
            }, 500);

            function updateCoolPlayBtn() {
                if (video.paused) {
                    coolPlayIcon.innerText = "play_arrow";
                    if (controlsVisible) coolPlayOverlay.classList.remove('ui-hidden');
                } else {
                    coolPlayOverlay.classList.add('ui-hidden');
                }
            }

            coolPlayBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (video.paused) video.play(); else video.pause();
            });

            // ওয়ান-ট্যাপ ক্লিন শো/হাইড কন্ট্রোল
            container.addEventListener('click', (e) => {
                if (isLocked) return;
                if (serverPopup.style.display === 'flex') {
                    serverPopup.style.display = 'none';
                    return;
                }

                controlsVisible = !controlsVisible;
                const shakaControls = document.querySelector('.shaka-controls-container');

                if (controlsVisible) {
                    if (shakaControls) shakaControls.classList.remove('ui-hidden');
                    topLeftPanel.classList.remove('ui-hidden');
                    telegramLink.classList.remove('ui-hidden');
                    if (video.paused) coolPlayOverlay.classList.remove('ui-hidden');
                } else {
                    if (shakaControls) shakaControls.classList.add('ui-hidden');
                    topLeftPanel.classList.add('ui-hidden');
                    telegramLink.classList.add('ui-hidden');
                    coolPlayOverlay.classList.add('ui-hidden');
                }
            });

            topLeftPanel.addEventListener('click', (e) => e.stopPropagation());
            serverPopup.addEventListener('click', (e) => e.stopPropagation());
            video.addEventListener('play', updateCoolPlayBtn);
            video.addEventListener('pause', updateCoolPlayBtn);

            async function loadServer(index) {
                if (index >= serverList.length) index = 0;
                currentServerIndex = index;
                const currentServer = serverList[currentServerIndex];
                currentServerLabel.innerText = currentServer.name;

                player.configure({
                    drm: { clearKeys: currentServer.clearKeys },
                    streaming: { lowLatencyMode: true, bufferingGoal: 12 }
                });

                statusText.innerText = `CONNECTING ${currentServer.name}...`;
                loader.style.opacity = '1';
                if (autoSwitchEnabled) startFallbackTimer();

                try {
                    await player.load(currentServer.url);
                } catch (error) {
                    if (autoSwitchEnabled) handleStreamFailure();
                }
                renderServerPopup();
            }

            function startFallbackTimer() {
                clearTimeout(fallbackTimer);
                fallbackTimer = setTimeout(() => handleStreamFailure(), LOAD_TIMEOUT);
            }

            function handleStreamFailure() {
                if (!autoSwitchEnabled) return;
                let nextIndex = (currentServerIndex + 1) % serverList.length;
                statusText.innerHTML = `<span style='color:#E11D48;'>TIMEOUT! SWITCHING SERVER...</span>`;
                setTimeout(() => loadServer(nextIndex), 2000);
            }

            video.addEventListener('playing', () => {
                loader.style.opacity = '0';
                clearTimeout(fallbackTimer);
                updateCoolPlayBtn();
            });

            video.addEventListener('waiting', () => {
                statusText.innerText = "BUFFERING...";
                loader.style.opacity = '1';
                if (autoSwitchEnabled) startFallbackTimer();
            });

            function renderServerPopup() {
                serverListWrapper.innerHTML = '';
                serverList.forEach((srv, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'server-item-btn';
                    btn.innerText = srv.name;
                    if(idx === currentServerIndex) btn.classList.add('active');
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        serverPopup.style.display = 'none';
                        if(idx !== currentServerIndex) loadServer(idx);
                    });
                    serverListWrapper.appendChild(btn);
                });
            }

            await loadServer(0);

            serverMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                serverPopup.style.display = (serverPopup.style.display === 'flex') ? 'none' : 'flex';
            });

            customFullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) {
                    if (container.requestFullscreen) container.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            });

            function checkFullscreenState() {
                const shakaControls = document.querySelector('.shaka-controls-container');
                if (document.fullscreenElement) {
                    isPlayerFullscreen = true;
                    container.classList.add('is-fullscreen');
                    fsIcon.innerText = 'fullscreen_exit';
                } else {
                    isPlayerFullscreen = false;
                    container.classList.remove('is-fullscreen');
                    fsIcon.innerText = 'fullscreen';
                    if (shakaControls) shakaControls.classList.remove('ui-hidden');
                    topLeftPanel.classList.remove('ui-hidden');
                    updateCoolPlayBtn();
                }
            }

            document.addEventListener('fullscreenchange', checkFullscreenState);
        });
    </script>
</body>
</html>
