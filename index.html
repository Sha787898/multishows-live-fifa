<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>MultiShows Premium Stream</title>     
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FMP9REY96D');
    </script>

    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }  
        html, body {  
            background: #000;  
            height: 100%;  
            width: 100%;  
            overflow: hidden;  
            font-family: system-ui, -apple-system, sans-serif;  
        }  
        .shaka-video-container {  
            position: relative;  
            width: 100%;  
            height: 100vh;  
            touch-action: none;
        }  
        video {  
            width: 100%;  
            height: 100%;  
            background: #000;  
            object-fit: contain;  
        }  

        /* --- BRIGHTNESS FILTER OVERLAY --- */
        #brightnessOverlay {
            position: absolute;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        /* --- SMALLER TELEGRAM WATERMARK (RIGHT SIDE) --- */
        .video-watermark {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 6px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            text-decoration: none !important;
            transition: all 0.2s ease;
        }
        .video-watermark span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 9.5px; 
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-block;
        }
        .video-watermark:hover {
            background: #0088ff;
            border-color: #0088ff;
        }
        .video-watermark:hover span {
            color: #fff;
        }

        /* --- FIXED SERVER SWITCH PANEL (LEFT SIDE - INDEPENDENT) --- */
        .top-left-panel {
            position: absolute;
            top: 12px; 
            left: 12px;
            z-index: 100;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .top-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            height: 24px; 
            padding: 0 10px;
            border-radius: 6px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            font-size: 9.5px; 
            font-weight: 700;
            letter-spacing: 1px;
        }
        .top-btn.btn-circle {
            width: 24px;
            padding: 0;
        }
        .top-btn span.material-icons { font-size: 12px; } 
        .top-btn:hover, .top-btn.active-btn { background: #E11D48; color: #fff; border-color: #E11D48; }

        /* লক বাটন কন্ট্রোল */
        #lockBtn { display: none; }
        .is-fullscreen #lockBtn { display: flex; }

        .player-locked #customFullscreenBtn, .player-locked #serverMenuBtn { display: none !important; }
        .player-locked #lockBtn { background: #E11D48 !important; border-color: #E11D48 !important; color: #fff; height: 28px; width: 28px; }
        .player-locked #lockBtn span { font-size: 15px; }
        .player-locked .shaka-controls-container { display: none !important; }

        /* --- SERVER DROP-DOWN MENU --- */
        .server-popup {
            position: absolute;
            top: 42px; 
            left: 12px;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(225, 29, 72, 0.3);
            border-radius: 8px;
            padding: 5px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 110px;
            z-index: 101;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
        .server-popup button {
            background: transparent;
            border: none;
            color: #ffffff;
            padding: 6px 10px;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s;
        }
        .server-popup button:hover {
            background: rgba(225, 29, 72, 0.2);
            color: #E11D48;
        }
        .server-popup button.active {
            background: #E11D48;
            color: #fff;
        }

        /* --- GESTURE OSD INDICATORS --- */
        .gesture-indicator {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.8);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 99;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            border: 1px solid rgba(225, 29, 72, 0.25);
            backdrop-filter: blur(6px);
        }

        /* --- PREMIUM NEO-RED GLASS THEME --- */
        .shaka-overflow-menu, .shaka-settings-menu {
            background: rgba(12, 12, 12, 0.94) !important;
            backdrop-filter: blur(14px) !important;
            border: 1px solid rgba(225, 29, 72, 0.25) !important;
            border-radius: 12px !important;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8) !important;
        }
        .shaka-overflow-menu span, .shaka-settings-menu span, .shaka-overflow-menu button, .shaka-settings-menu button {
            color: #ffffff !important;
            font-weight: 600 !important;
        }
        .shaka-overflow-menu button:hover, .shaka-settings-menu button:hover {
            background: rgba(225, 29, 72, 0.22) !important;
            color: #E11D48 !important;
        }
        
        .shaka-volume-bar-container .shaka-volume-bar-level { background: #E11D48 !important; }
        .shaka-seek-bar-container .shaka-seek-bar-played { background: #E11D48 !important; box-shadow: 0 0 10px rgba(225, 29, 72, 0.6); }
        
        /* Modern Loader */
        .custom-loader {
            position: absolute;
            bottom: 85px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 9;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-text {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(6px);
            padding: 7px 18px;
            border-radius: 30px;
            color: #E11D48;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: 1px solid rgba(225, 29, 72, 0.2);
        }
        .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg { display: none !important; }  
    </style>  
</head>  
<body>  

    <div class="shaka-video-container" data-shaka-player-container id="playerContainer">  
        <div id="brightnessOverlay"></div>

        <a href="https://t.me/MultiShowsFUN" target="_blank" class="video-watermark" id="telegramLink">
            <span>MultiShows</span>
        </a>

        <div id="gestureOsd" class="gesture-indicator">
            <span class="material-icons" id="gestureIcon">volume_up</span>
            <span id="gestureValue">50%</span>
        </div>

        <div id="loadingOverlay" class="custom-loader">
            <div id="statusText" class="loading-text">LOADING MULTISHOWS...</div>
        </div>

        <video autoplay playsinline id="video" class="shaka-video" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>  
        
        <div class="top-left-panel">
            <button class="top-btn" id="serverMenuBtn" title="Change Server">
                <span class="material-icons">dns</span> <span id="currentServerLabel">SERVER 1</span>
            </button>
            <button class="top-btn btn-circle" id="customFullscreenBtn" title="Toggle Fullscreen">
                <span class="material-icons" id="fsIcon">fullscreen</span>
            </button>
            <button class="top-btn btn-circle" id="lockBtn" title="Lock Screen">
                <span class="material-icons" id="lockIcon">lock_open</span>
            </button>
        </div>

        <div class="server-popup" id="serverPopup"></div>
    </div>  
  
    <script>  
        let isLocked = false;
        let isPlayerFullscreen = false; 
        let brightness = 100; 

        // --- MULTI-SERVER CONFIGURATION (FIXED COMMAS) ---
        const serverList = [
            {
                name: "SERVER 1",
                url: "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd",
                clearKeys: { "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050" }
            },
            {
                name: "SERVER 2",
                url: "https://otte-tim.live.pv-cdn.net/pdx-nitro/live/clients/dash/enc/ajfoeddkbz/out/v1/b78800b9b2304879b15843f455836829/cenc.mpd",
                clearKeys: { "f6564ec2aee819046328a0e153be574d": "ff46a8a1031eb27ef22576a077c98ab7" }
            },
            {
                name: "SERVER 3",
                url: "https://live.vrtcdn.be/groupd/live/0761024f-37fe-4254-bc37-e95d7c62b2d1/live.isml/.mpd",
                clearKeys: { "893bc63340876605f52886a42e0ccce5": "d6c46d2d691056fbd091bf1f01b21a91" }
            },
            {
                name: "SERVER 4",
                url: "https://a121aivottepl-a.akamaihd.net/gru-nitro/live/clients/dash/enc/jo3rmhhp2r/out/v1/50656942ce4e40a1be824c9d83578fe9/cenc.mpd",
                clearKeys: { "34475edab991ad5e92548aebd710410a": "501b209cccd323ac00bf5ac15b406cb4" }
            }
            {
                name: "SERVER 5",
                url: "https://live-oneapp-prd-news.akamaized.net/Content/CMAF_OL2-CTR-4s-v2/Live/channel(kvea)/master.mpd",
                clearKeys: { "ce7ab3022e753307997f58afe001bac4": "72d631a66e635c60829a0fe7705516c1" }
        }
        ];

        let currentServerIndex = 0;
        let fallbackTimer = null;
        const LOAD_TIMEOUT = 15000; 

        document.addEventListener('DOMContentLoaded', async () => {  
            shaka.polyfill.installAll();  
            if (!shaka.Player.isBrowserSupported()) return;  
        
            const video = document.getElementById('video');  
            const container = document.getElementById('playerContainer');  
            const loader = document.getElementById('loadingOverlay');
            const statusText = document.getElementById('statusText');
            const lockBtn = document.getElementById('lockBtn');
            const lockIcon = document.getElementById('lockIcon');
            const customFullscreenBtn = document.getElementById('customFullscreenBtn');
            const fsIcon = document.getElementById('fsIcon');
            const telegramLink = document.getElementById('telegramLink');
            
            const serverMenuBtn = document.getElementById('serverMenuBtn');
            const serverPopup = document.getElementById('serverPopup');
            const currentServerLabel = document.getElementById('currentServerLabel');
            
            const player = new shaka.Player(video);  
            const ui = new shaka.ui.Overlay(player, container, video);  
        
            ui.configure({  
                controlPanelElements: [  
                    'play_pause', 'time_and_duration', 'mute', 'volume',  
                    'spacer', 'language', 'captions', 'picture_in_picture',  
                    'quality', 'fullscreen'  
                ],  
                volumeBarColors: { base: 'rgba(225, 29, 72, 0.15)', level: 'rgb(225, 29, 72)' },  
                seekBarColors: { base: 'rgba(255, 255, 255, 0.12)', buffered: 'rgba(255, 255, 255, 0.25)', played: 'rgb(225, 29, 72)' }
            });  

            async function loadServer(index) {
                if (index >= serverList.length) index = 0; 
                currentServerIndex = index;
                
                const currentServer = serverList[currentServerIndex];
                currentServerLabel.innerText = currentServer.name;
                
                player.configure({  
                    drm: { clearKeys: currentServer.clearKeys },  
                    streaming: {  
                        lowLatencyMode: true,  
                        bufferingGoal: 12,  
                        rebufferingGoal: 2.5,  
                        bufferBehind: 10,
                        crossOrigin: 'anonymous'
                    }  
                });  

                statusText.innerText = `CONNECTING ${currentServer.name}...`;
                loader.style.opacity = '1';
                
                startFallbackTimer(); 

                try {  
                    await player.load(currentServer.url);  
                } catch (error) {
                    handleStreamFailure();
                }  
                renderServerPopup();
            }

            function startFallbackTimer() {
                clearTimeout(fallbackTimer);
                fallbackTimer = setTimeout(() => {
                    handleStreamFailure();
                }, LOAD_TIMEOUT);
            }

            function stopFallbackTimer() {
                clearTimeout(fallbackTimer);
            }

            function handleStreamFailure() {
                stopFallbackTimer();
                let nextIndex = (currentServerIndex + 1) % serverList.length;
                statusText.innerHTML = `<span style='color:#E11D48;'>TIMEOUT! SWITCHING TO SERVER ${nextIndex + 1}...</span>`;
                loader.style.opacity = '1';
                
                setTimeout(() => {
                    loadServer(nextIndex);
                }, 2000); 
            }
        
            video.addEventListener('playing', () => { 
                loader.style.opacity = '0'; 
                stopFallbackTimer(); 
            });
            
            video.addEventListener('waiting', () => { 
                statusText.innerText = "BUFFERING..."; 
                loader.style.opacity = '1'; 
                startFallbackTimer(); 
            });

            player.addEventListener('error', (event) => {  
                handleStreamFailure();
            });  

            function renderServerPopup() {
                serverPopup.innerHTML = '';
                serverList.forEach((srv, idx) => {
                    const btn = document.createElement('button');
                    btn.innerText = srv.name;
                    if(idx === currentServerIndex) btn.classList.add('active');
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        serverPopup.style.display = 'none';
                        if(idx !== currentServerIndex) {
                            loadServer(idx);
                        }
                    });
                    serverPopup.appendChild(btn);
                });
            }

            await loadServer(0);

            serverMenuBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                serverPopup.style.display = (serverPopup.style.display === 'flex') ? 'none' : 'flex';
            });

            document.addEventListener('click', () => {
                serverPopup.style.display = 'none';
            });

            lockBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isPlayerFullscreen) return; 
                isLocked = !isLocked;
                if(isLocked) {
                    container.classList.add('player-locked');
                    lockIcon.innerText = 'lock';
                    telegramLink.style.pointerEvents = 'none';
                    serverPopup.style.display = 'none';
                } else {
                    container.classList.remove('player-locked');
                    lockIcon.innerText = 'lock_open';
                    telegramLink.style.pointerEvents = 'auto';
                    const controls = document.querySelector('.shaka-controls-container');
                    if (controls) controls.setAttribute('show-controls', 'true');
                }
            });

            customFullscreenBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!document.fullscreenElement) {
                    if (container.requestFullscreen) { container.requestFullscreen(); }
                    else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
                    fsIcon.innerText = 'fullscreen_exit';
                } else {
                    if (document.exitFullscreen) { document.exitFullscreen(); }
                    fsIcon.innerText = 'fullscreen';
                }
            });

            function checkFullscreenState() {
                if (document.fullscreenElement || window.innerHeight == screen.height) {
                    isPlayerFullscreen = true;
                    container.classList.add('is-fullscreen');
                    fsIcon.innerText = 'fullscreen_exit';
                } else {
                    isPlayerFullscreen = false;
                    isLocked = false; 
                    container.classList.remove('player-locked');
                    container.classList.remove('is-fullscreen');
                    lockIcon.innerText = 'lock_open';
                    fsIcon.innerText = 'fullscreen';
                    telegramLink.style.pointerEvents = 'auto';
                    brightness = 100;
                    document.getElementById('brightnessOverlay').style.opacity = 0;
                    serverPopup.style.display = 'none';
                }
            }

            document.addEventListener('fullscreenchange', checkFullscreenState);
            document.addEventListener('webkitfullscreenchange', checkFullscreenState);
            window.addEventListener('resize', checkFullscreenState);

            const bOverlay = document.getElementById('brightnessOverlay');
            const gOsd = document.getElementById('gestureOsd');
            const gIcon = document.getElementById('gestureIcon');
            const gValue = document.getElementById('gestureValue');

            let startX, startY, startVol, startBright;
            let osdTimeout;

            function showOSD(icon, value) {
                gIcon.innerText = icon;
                gValue.innerText = value;
                gOsd.style.opacity = '1';
                clearTimeout(osdTimeout);
                osdTimeout = setTimeout(() => { gOsd.style.opacity = '0'; }, 800);
            }

            container.addEventListener('touchstart', (e) => {
                if (!isPlayerFullscreen || isLocked) return; 
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                startVol = video.volume;
                startBright = brightness;
            });

            container.addEventListener('touchmove', (e) => {
                if (!isPlayerFullscreen || isLocked) return; 
                const touch = e.touches[0];
                const deltaY = startY - touch.clientY; 
                const sensitivity = 0.35; 

                const screenWidth = container.clientWidth;
                
                if (startX < screenWidth / 2) {
                    let newBright = startBright + (deltaY * sensitivity);
                    newBright = Math.max(10, Math.min(100, newBright)); 
                    brightness = newBright;
                    bOverlay.style.opacity = (100 - brightness) / 100 * 0.85; 
                    showOSD('brightness_6', Math.round(brightness) + '%');
                } 
                else {
                    let newVol = startVol + (deltaY / 350); 
                    newVol = Math.max(0, Math.min(1, newVol));
                    video.volume = newVol;
                    showOSD(newVol === 0 ? 'volume_off' : 'volume_up', Math.round(newVol * 100) + '%');
                }
            });
        });  
    </script>  
</body>  
</html>
