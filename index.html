<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MultiShows Premium Stream</title>
    <!-- Shaka Player UI & Controls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <!-- HLS Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.8/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { background: #000; font-family: system-ui, -apple-system, sans-serif; }
        
        /* Responsive Aspect Ratio for Inline View */
        .shaka-video-container { 
            position: relative; 
            width: 100% !important; 
            aspect-ratio: 16/9;
            height: auto !important;
            background: #000;
            overflow: hidden !important; 
            display: block !important;
        }
        
        /* Fullscreen override */
        .shaka-video-container:fullscreen, 
        .shaka-video-container.is-fullscreen {
            width: 100% !important;
            height: 100vh !important;
            aspect-ratio: auto !important;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        video { width: 100% !important; height: 100% !important; background: #000; display: block !important; transition: object-fit 0.2s ease; }
        video.fit-contain { object-fit: contain !important; }
        video.fit-stretch { object-fit: fill !important; }
        video.fit-cover { object-fit: cover !important; }

        #brightnessOverlay { position: absolute; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 1; }
        
        .shaka-controls-container { position: absolute !important; inset: 0 !important; width: 100% !important; height: 100% !important; background: transparent !important; }
        
        .shaka-play-button-container, .shaka-scrim-container { 
            display: none !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; width: 0px !important; height: 0px !important;
        }

        .shaka-play-pause-button, .shaka-mute-button, .shaka-picture-in-picture-button, .shaka-fullscreen-button { color: #E11D48 !important; }
        .shaka-seek-bar-container .shaka-seek-bar-played { background: #E11D48 !important; box-shadow: 0 0 12px rgba(225, 29, 72, 0.7); }
        .shaka-seek-bar-container .shaka-seek-bar-buffered { background: rgba(255, 255, 255, 0.25) !important; }
        
        /* Watermark Auto Hide/Scale on small containers */
        .video-watermark { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.6); padding: 4px 8px; border-radius: 4px; z-index: 100; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(4px); text-decoration: none !important; }
        .video-watermark span { color: rgba(255, 255, 255, 0.8); font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        
        /* Top Responsive Control Panel */
        .top-left-panel { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; max-width: calc(100% - 90px); }
        
        .top-btn { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.15); color: rgba(255, 255, 255, 0.9); height: 24px; padding: 0 6px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 3px; backdrop-filter: blur(4px); font-size: 9px; font-weight: 600; }
        .top-btn.btn-circle { width: 24px; padding: 0; }
        .top-btn span.material-icons { font-size: 11px; }
        .top-btn:hover { background: #E11D48; color: #fff; border-color: #E11D48; }
        
        #lockBtn { display: none; }
        .is-fullscreen #lockBtn { display: flex; }
        
        /* Popups styling fixes */
        .server-popup, .quality-popup { position: absolute; top: 38px; left: 10px; background: rgba(12, 12, 12, 0.98); backdrop-filter: blur(8px); border: 1px solid rgba(225, 29, 72, 0.4); border-radius: 6px; padding: 6px; display: none; flex-direction: column; gap: 4px; width: 145px; z-index: 101; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .quality-popup { left: 80px; width: 165px; }
        
        .server-list-wrapper, .quality-list-wrapper { display: flex; flex-direction: column; gap: 4px; max-height: 140px; overflow-y: auto; }
        .server-popup button.server-item-btn, .quality-popup button.quality-item-btn { background: transparent; border: none; color: #ccc; padding: 5px 8px; text-align: left; font-size: 9.5px; font-weight: 600; border-radius: 4px; width: 100%; cursor: pointer; }
        .server-popup button.server-item-btn.active, .quality-popup button.quality-item-btn.active { background: #E11D48; color: #fff; }
        
        .cool-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .cool-play-btn { width: 50px; height: 50px; background: rgba(10, 10, 10, 0.85); border: 2px solid #E11D48; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; backdrop-filter: blur(4px); box-shadow: 0 0 15px rgba(225, 29, 72, 0.4); }
        .cool-play-btn span { color: #fff; font-size: 26px; margin-left: 2px; }
        
        .gesture-indicator { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 10, 0.85); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; z-index: 110; pointer-events: none; opacity: 0; transition: opacity 0.15s ease; border: 1px solid #E11D48; }
        
        .custom-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9; pointer-events: none; }
        .loading-text { background: rgba(10, 10, 10, 0.9); padding: 6px 14px; border-radius: 20px; color: #E11D48; font-size: 10px; font-weight: 700; border: 1px solid rgba(225, 29, 72, 0.3); }
        
        .ui-hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }
        .shaka-volume-bar-container, .shaka-overflow-menu { display: none !important; }
    </style>
</head>
<body>
    <div class="shaka-video-container" data-shaka-player-container id="playerContainer">
        <div id="brightnessOverlay"></div>
        <a href="https://t.me/MultiShowsFUN" target="_blank" class="video-watermark" id="telegramLink">
            <span>MultiShows</span>
        </a>
        <div class="cool-play-overlay" id="coolPlayOverlay">
            <div class="cool-play-btn" id="coolPlayBtn">
                <span class="material-icons" id="coolPlayIcon">play_arrow</span>
            </div>
        </div>
        <div id="gestureOsd" class="gesture-indicator">
            <span class="material-icons" id="gestureIcon">volume_up</span>
            <span id="gestureValue">100%</span>
        </div>
        <div id="loadingOverlay" class="custom-loader">
            <div id="statusText" class="loading-text">LOADING MULTISHOWS...</div>
        </div>
        
        <video autoplay playsinline id="video" class="shaka-video fit-contain" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>
        
        <div class="top-left-panel" id="topLeftPanel">
            <button class="top-btn" id="serverMenuBtn">
                <span class="material-icons">dns</span>
                <span id="currentServerLabel">SERVER</span>
            </button>
            <button class="top-btn" id="qualityMenuBtn">
                <span class="material-icons">settings</span>
                <span id="currentQualityLabel">Auto</span>
            </button>
            <button class="top-btn" id="fitScreenBtn">
                <span class="material-icons">aspect_ratio</span>
                <span id="fitScreenLabel">Fit</span>
            </button>
            <button class="top-btn btn-circle" id="customFullscreenBtn">
                <span class="material-icons" id="fsIcon">fullscreen</span>
            </button>
            <button class="top-btn btn-circle" id="lockBtn">
                <span class="material-icons" id="lockIcon">lock_open</span>
            </button>
        </div>
        
        <div class="server-popup" id="serverPopup">
            <div class="server-list-wrapper" id="serverListWrapper"></div>
        </div>
        
        <div class="quality-popup" id="qualityPopup">
            <div class="quality-list-wrapper" id="qualityListWrapper"></div>
        </div>
    </div>

<script>
    let isLocked = false;
    let isPlayerFullscreen = false;
    let brightness = 100;
    let autoSwitchEnabled = true;
    let controlsVisible = true;
    let serverList = [];
    let currentServerIndex = 0;
    let fallbackTimer = null;
    let uiMasterTimer = null;
    const LOAD_TIMEOUT = 10000;
    let currentFitState = 0; 
    let hlsInstance = null; 
    let player = null; 

    // Sound Boost Engine Nodes
    let audioCtx = null;
    let gainNode = null;
    let compressorNode = null;
    let sourceNode = null;
    let audioBoostMultiplier = 1.0; 

    function initAudioBoostEngine() {
        if (audioCtx) return;
        try {
            const video = document.getElementById('video');
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioCtx.createMediaElementSource(video);
            
            compressorNode = audioCtx.createDynamicsCompressor();
            compressorNode.threshold.setValueAtTime(-24, audioCtx.currentTime);
            compressorNode.knee.setValueAtTime(30, audioCtx.currentTime);
            compressorNode.ratio.setValueAtTime(12, audioCtx.currentTime);
            compressorNode.attack.setValueAtTime(0.003, audioCtx.currentTime);
            compressorNode.release.setValueAtTime(0.25, audioCtx.currentTime);

            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);

            sourceNode.connect(compressorNode);
            compressorNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        } catch(e) { console.log("AudioContext blocked initial touch."); }
    }

    function setAudioBoostLevel(multiplier) {
        initAudioBoostEngine();
        if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); }
        if (gainNode) {
            audioBoostMultiplier = Math.max(1.0, Math.min(3.0, multiplier));
            gainNode.gain.setValueAtTime(audioBoostMultiplier, audioCtx.currentTime);
        }
    }

    async function fetchSecureServers() {
        try {
            const response = await fetch('https://solitary-meadow-ecemultishows-api.shabidalhasan.workers.dev/?t=' + new Date().getTime(), { 
                method: 'GET',
                headers: { 'X-MultiShows-Auth': 'Premium-Streaming-MS-2026', 'Accept': 'application/json' }
            });
            const rawData = await response.json();
            if(rawData && rawData.match_1 && rawData.match_1.servers) {
                serverList = rawData.match_1.servers;
                return true;
            }
            return false;
        } catch (error) { return false; }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById('video');
        const container = document.getElementById('playerContainer');
        const loader = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const lockBtn = document.getElementById('lockBtn');
        const lockIcon = document.getElementById('lockIcon');
        const customFullscreenBtn = document.getElementById('customFullscreenBtn');
        const fsIcon = document.getElementById('fsIcon');
        const telegramLink = document.getElementById('telegramLink');
        const topLeftPanel = document.getElementById('topLeftPanel');
        const serverMenuBtn = document.getElementById('serverMenuBtn');
        const serverPopup = document.getElementById('serverPopup');
        const serverListWrapper = document.getElementById('serverListWrapper');
        const qualityMenuBtn = document.getElementById('qualityMenuBtn');
        const qualityPopup = document.getElementById('qualityPopup');
        const qualityListWrapper = document.getElementById('qualityListWrapper');
        const currentQualityLabel = document.getElementById('currentQualityLabel');
        const currentServerLabel = document.getElementById('currentServerLabel');
        const coolPlayOverlay = document.getElementById('coolPlayOverlay');
        const coolPlayBtn = document.getElementById('coolPlayBtn');
        const coolPlayIcon = document.getElementById('coolPlayIcon');
        const fitScreenBtn = document.getElementById('fitScreenBtn');
        const fitScreenLabel = document.getElementById('fitScreenLabel');

        player = new shaka.Player(video);
        
        // Balanced Buffering setup to avoid continuous heavy data load
        player.configure({
            streaming: { 
                lowLatencyMode: false,
                bufferingGoal: 30,     // 30 seconds buffer for maximum stability
                rebufferingGoal: 6,   
                bufferBehind: 15, 
                stallThreshold: 4.0
            },
            abr: { enabled: true }
        });

        player.addEventListener('trackschanged', generateQualityMenu);
        player.addEventListener('variantchanged', updateActiveQualityButton);

        function generateQualityMenu() {
            qualityListWrapper.innerHTML = '';
            if (hlsInstance) {
                const autoBtn = document.createElement('button');
                autoBtn.className = 'quality-item-btn active';
                autoBtn.innerText = 'Adaptive Dynamic';
                qualityListWrapper.appendChild(autoBtn);
                return;
            }
            const autoBtn = document.createElement('button');
            autoBtn.className = 'quality-item-btn';
            autoBtn.innerText = 'Auto (Adaptive)';
            autoBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                player.configure({ abr: { enabled: true } });
                currentQualityLabel.innerText = 'Auto';
                qualityPopup.style.display = 'none';
            });
            qualityListWrapper.appendChild(autoBtn);

            let tracks = player.getVariantTracks();
            tracks.sort((a, b) => b.bandwidth - a.bandwidth);
            tracks.forEach(track => {
                const btn = document.createElement('button');
                btn.className = 'quality-item-btn';
                btn.innerText = `${track.height}p - ${(track.bandwidth / 1000000).toFixed(1)}M`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    player.configure({ abr: { enabled: false } });
                    player.selectVariantTrack(track, true);
                    currentQualityLabel.innerText = `${track.height}p`;
                    qualityPopup.style.display = 'none';
                });
                qualityListWrapper.appendChild(btn);
            });
        }

        function updateActiveQualityButton() {
            if (hlsInstance) return;
            if (player.getConfiguration().abr.enabled) { currentQualityLabel.innerText = 'Auto'; } 
            else {
                const tracks = player.getVariantTracks();
                const active = tracks.find(t => t.active);
                if (active) currentQualityLabel.innerText = `${active.height}p`;
            }
        }

        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            controlPanelElements: [ 'play_pause', 'time_and_duration', 'spacer', 'fullscreen' ],
            addPlayPauseButton: false
        });

        const shakaControls = document.querySelector('.shaka-controls-container');

        fitScreenBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentFitState = (currentFitState + 1) % 3;
            video.className = "shaka-video";
            if (currentFitState === 0) { video.classList.add('fit-contain'); fitScreenLabel.innerText = "Fit"; } 
            else if (currentFitState === 1) { video.classList.add('fit-stretch'); fitScreenLabel.innerText = "Stretch"; } 
            else if (currentFitState === 2) { video.classList.add('fit-cover'); fitScreenLabel.innerText = "Zoom"; }
        });

        function showAllControls() {
            if (isLocked) return;
            controlsVisible = true;
            topLeftPanel.classList.remove('ui-hidden');
            if (shakaControls) shakaControls.classList.remove('ui-hidden');
            telegramLink.classList.remove('ui-hidden');
            if (video.paused) { coolPlayOverlay.classList.remove('ui-hidden'); }
        }

        function hideAllControls() {
            if (video.paused && !isLocked) return;
            controlsVisible = false;
            if (!isLocked) topLeftPanel.classList.add('ui-hidden');
            if (shakaControls) shakaControls.classList.add('ui-hidden');
            telegramLink.classList.add('ui-hidden');
            coolPlayOverlay.classList.add('ui-hidden');
            serverPopup.style.display = 'none';
            qualityPopup.style.display = 'none';
        }

        function resetMasterTimer() {
            clearTimeout(uiMasterTimer);
            if (!video.paused && !isLocked) { uiMasterTimer = setTimeout(hideAllControls, 3500); }
        }

        container.addEventListener('click', (e) => {
            if (isLocked) return;
            if (serverPopup.style.display === 'flex' || qualityPopup.style.display === 'flex') {
                serverPopup.style.display = 'none';
                qualityPopup.style.display = 'none';
                return;
            }
            if (!controlsVisible) { showAllControls(); resetMasterTimer(); } 
            else { hideAllControls(); }
        });

        coolPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (video.paused) { video.play().catch(()=>{}); } else { video.pause(); }
        });

        video.addEventListener('play', () => { coolPlayOverlay.classList.add('ui-hidden'); resetMasterTimer(); });
        video.addEventListener('pause', () => { coolPlayOverlay.classList.remove('ui-hidden'); });

        async function loadServer(index) {
            if (!serverList || serverList.length === 0) return;
            currentServerIndex = index;
            const currentServer = serverList[currentServerIndex];
            currentServerLabel.innerText = currentServer.name;
            statusText.innerText = `CONNECTING ${currentServer.name}...`;
            loader.style.opacity = '1';
            
            if (autoSwitchEnabled) startFallbackTimer();
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

            const streamUrl = currentServer.url;
            if (streamUrl.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({ maxBufferLength: 20, enableWorker: true, lowLatencyMode: false });
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); generateQualityMenu(); });
                }
            } else {
                try {
                    player.configure({ drm: { clearKeys: currentServer.clearKeys } });
                    await player.load(streamUrl);
                    video.play().catch(()=>{});
                } catch (error) { if (autoSwitchEnabled) handleStreamFailure(); }
            }
            renderServerPopup();
        }

        function startFallbackTimer() {
            clearTimeout(fallbackTimer);
            fallbackTimer = setTimeout(() => { handleStreamFailure(); }, LOAD_TIMEOUT);
        }

        function handleStreamFailure() {
            if (!autoSwitchEnabled) return;
            let nextIndex = (currentServerIndex + 1) % serverList.length;
            loadServer(nextIndex);
        }

        video.addEventListener('playing', () => { loader.style.opacity = '0'; clearTimeout(fallbackTimer); });
        video.addEventListener('waiting', () => { loader.style.opacity = '1'; statusText.innerText = "BUFFERING..."; });

        function renderServerPopup() {
            serverListWrapper.innerHTML = '';
            serverList.forEach((srv, idx) => {
                const btn = document.createElement('button');
                btn.className = `server-item-btn ${idx === currentServerIndex ? 'active' : ''}`;
                btn.innerText = srv.name;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    serverPopup.style.display = 'none';
                    if(idx !== currentServerIndex) loadServer(idx);
                });
                serverListWrapper.appendChild(btn);
            });
        }

        const secureLoadSuccess = await fetchSecureServers();
        if (secureLoadSuccess && serverList.length > 0) { await loadServer(0); }

        serverMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation(); qualityPopup.style.display = 'none';
            serverPopup.style.display = (serverPopup.style.display === 'flex') ? 'none' : 'flex';
        });

        qualityMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation(); serverPopup.style.display = 'none';
            qualityPopup.style.display = (qualityPopup.style.display === 'flex') ? 'none' : 'flex';
        });

        lockBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isLocked = !isLocked;
            if(isLocked) {
                container.classList.add('player-locked');
                lockIcon.innerText = 'lock';
                hideAllControls();
            } else {
                container.classList.remove('player-locked');
                lockIcon.innerText = 'lock_open';
                showAllControls();
            }
        });

        customFullscreenBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) { container.requestFullscreen(); }
                container.classList.add('is-fullscreen');
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                container.classList.remove('is-fullscreen');
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                isPlayerFullscreen = false; isLocked = false;
                container.classList.remove('player-locked', 'is-fullscreen');
                lockIcon.innerText = 'lock_open'; fsIcon.innerText = 'fullscreen';
                brightness = 100; document.getElementById('brightnessOverlay').style.opacity = 0;
                setAudioBoostLevel(1.0); video.volume = 1.0;
                showAllControls();
            } else {
                isPlayerFullscreen = true;
                fsIcon.innerText = 'fullscreen_exit';
            }
        });

        // FIXED Touch Gestures: Works ONLY in Fullscreen to prevent inline bugs/skips
        const bOverlay = document.getElementById('brightnessOverlay');
        const gOsd = document.getElementById('gestureOsd');
        const gIcon = document.getElementById('gestureIcon');
        const gValue = document.getElementById('gestureValue');
        let startX, startY, startVol, startBright, startGain;
        let osdTimeout;

        function showOSD(icon, value) {
            gIcon.innerText = icon; gValue.innerText = value;
            gOsd.style.opacity = '1'; clearTimeout(osdTimeout);
            osdTimeout = setTimeout(() => { gOsd.style.opacity = '0'; }, 800);
        }

        container.addEventListener('touchstart', (e) => {
            if (!isPlayerFullscreen || isLocked) return;
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            startVol = video.volume;
            startBright = brightness;
            
            initAudioBoostEngine();
            startGain = gainNode ? gainNode.gain.value : 1.0;
        });

        container.addEventListener('touchmove', (e) => {
            if (!isPlayerFullscreen || isLocked) return;
            
            const touch = e.touches[0];
            const deltaY = startY - touch.clientY;
            const sensitivity = 0.4;
            const screenWidth = container.clientWidth;
            
            // Left Side = Brightness Control
            if (startX < screenWidth / 2) {
                let newBright = startBright + (deltaY * sensitivity);
                newBright = Math.max(10, Math.min(100, newBright));
                brightness = newBright;
                bOverlay.style.opacity = (100 - brightness) / 100 * 0.85;
                showOSD('brightness_6', Math.round(brightness) + '%');
            } 
            // Right Side = Volume & Booster Control
            else {
                e.preventDefault(); // Stop native scrolling/skips on swipe
                
                // Safe Volume Down / Up Math
                if (deltaY < 0 && startGain <= 1.02) {
                    let newVol = startVol + (deltaY / 250);
                    newVol = Math.max(0.01, Math.min(1.0, newVol)); // Prevent hitting true 0 absolute baseline to avoid hard mute locks
                    video.volume = newVol;
                    setAudioBoostLevel(1.0);
                    showOSD('volume_up', Math.round(newVol * 100) + '%');
                } 
                else if (deltaY > 0 || startGain > 1.0) {
                    if (video.volume < 0.95) {
                        let newVol = startVol + (deltaY / 250);
                        video.volume = Math.max(0, Math.min(1, newVol));
                        showOSD('volume_up', Math.round(video.volume * 100) + '%');
                    } else {
                        video.volume = 1.0;
                        let calculatedGain = startGain + (deltaY / 200);
                        let targetBoost = Math.max(1.0, Math.min(3.0, calculatedGain));
                        setAudioBoostLevel(targetBoost);
                        showOSD('bolt', `BOOST ${Math.round(targetBoost * 100)}% 🚀`);
                    }
                }
            }
        });
    });
</script>
</body>
</html>
