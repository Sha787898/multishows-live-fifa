<script>
    let isLocked = false;
    let isPlayerFullscreen = false;
    let brightness = 100;
    let autoSwitchEnabled = true;
    let controlsVisible = true;
    let serverList = [];
    let currentServerIndex = 0;
    let fallbackTimer = null;
    let uiMasterTimer = null;
    let stealthResetTimer = null;
    const LOAD_TIMEOUT = 12000;
    let currentFitState = 0; 
    let hlsInstance = null; 
    let player = null; 

    // Advanced Audio Boost Engine Setup
    let audioCtx = null;
    let gainNode = null;
    let compressorNode = null;
    let sourceNode = null;
    let audioBoostMultiplier = 1.0; 

    function initAudioBoostEngine() {
        if (audioCtx) return;
        try {
            const video = document.getElementById('video');
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioCtx.createMediaElementSource(video);
            
            compressorNode = audioCtx.createDynamicsCompressor();
            compressorNode.threshold.setValueAtTime(-24, audioCtx.currentTime);
            compressorNode.knee.setValueAtTime(30, audioCtx.currentTime);
            compressorNode.ratio.setValueAtTime(12, audioCtx.currentTime);
            compressorNode.attack.setValueAtTime(0.003, audioCtx.currentTime);
            compressorNode.release.setValueAtTime(0.25, audioCtx.currentTime);

            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);

            sourceNode.connect(compressorNode);
            compressorNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            console.log("MultiShows Premium Audio System Integrated Successfully.");
        } catch(e) {
            console.error("Audio Boost Context Blocked By Browser Environment:", e);
        }
    }

    function setAudioBoostLevel(multiplier) {
        initAudioBoostEngine();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (gainNode) {
            audioBoostMultiplier = Math.max(1.0, Math.min(3.0, multiplier)); // Soft Limit max 300%
            gainNode.gain.setValueAtTime(audioBoostMultiplier, audioCtx.currentTime);
        }
    }

    async function fetchSecureServers() {
        try {
            // FIXED: Added security handshake tokens into Request Headers to pass Worker Firewall rules
            const response = await fetch('https://solitary-meadow-ecemultishows-api.shabidalhasan.workers.dev/?t=' + new Date().getTime(), { 
                method: 'GET',
                headers: {
                    'X-MultiShows-Auth': 'Premium-Streaming-MS-2026',
                    'Accept': 'application/json'
                }
            });
            if (!response.ok) throw new Error('Security Handshake Failed');
            const rawData = await response.json();
            if(rawData && rawData.match_1 && rawData.match_1.servers) {
                serverList = rawData.match_1.servers;
                return true;
            } else {
                throw new Error('Invalid API Response Format');
            }
        } catch (error) {
            console.error("Security Fetch Error:", error);
            document.getElementById('statusText').innerText = "SECURITY ERROR: WORKER AUTH REJECTED.";
            return false;
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById('video');
        const container = document.getElementById('playerContainer');
        const loader = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const lockBtn = document.getElementById('lockBtn');
        const lockIcon = document.getElementById('lockIcon');
        const customFullscreenBtn = document.getElementById('customFullscreenBtn');
        const fsIcon = document.getElementById('fsIcon');
        const telegramLink = document.getElementById('telegramLink');
        const topLeftPanel = document.getElementById('topLeftPanel');
        const serverMenuBtn = document.getElementById('serverMenuBtn');
        const serverPopup = document.getElementById('serverPopup');
        const serverListWrapper = document.getElementById('serverListWrapper');
        const qualityMenuBtn = document.getElementById('qualityMenuBtn');
        const qualityPopup = document.getElementById('qualityPopup');
        const qualityListWrapper = document.getElementById('qualityListWrapper');
        const currentQualityLabel = document.getElementById('currentQualityLabel');
        const autoSwitchToggle = document.getElementById('autoSwitchToggle');
        const currentServerLabel = document.getElementById('currentServerLabel');
        const coolPlayOverlay = document.getElementById('coolPlayOverlay');
        const coolPlayBtn = document.getElementById('coolPlayBtn');
        const coolPlayIcon = document.getElementById('coolPlayIcon');
        const infoToggleBtn = document.getElementById('infoToggleBtn');
        const infoPopup = document.getElementById('infoPopup');
        const infoCloseBtn = document.getElementById('infoCloseBtn');
        const fitScreenBtn = document.getElementById('fitScreenBtn');
        const fitScreenLabel = document.getElementById('fitScreenLabel');

        player = new shaka.Player(video);
        
        player.getNetworkingEngine().registerRequestFilter(function(type, request) {
            if (type == shaka.net.NetworkingEngine.RequestType.LICENSE || request.uris[0].includes('cloudflare')) {
                request.headers['Origin'] = window.location.origin;
                request.headers['X-Requested-With'] = 'XMLHttpRequest';
                request.allowCrossRedditCredentials = true;
            }
        });
        
        player.configure({
            streaming: { 
                lowLatencyMode: false,
                bufferingGoal: 45,     
                rebufferingGoal: 8, 
                bufferBehind: 15, 
                ignoreDeviceCapability: true,
                alwaysKeepInSync: true,
                stallThreshold: 1.5,
                retryParameters: { maxAttempts: 5, baseDelay: 1000, backoffFactor: 1.5, timeout: 8000 }
            },
            manifest: { dash: { ignoreMinBufferTime: true, multiTypeVariantsAllowed: true }, disableVideo: false },
            abr: { enabled: true, defaultBandwidthEstimate: 12000000 }
        });

        player.addEventListener('trackschanged', generateQualityMenu);
        player.addEventListener('variantchanged', updateActiveQualityButton);

        function generateQualityMenu() {
            qualityListWrapper.innerHTML = '';
            if (hlsInstance) {
                const autoBtn = document.createElement('button');
                autoBtn.className = 'quality-item-btn active';
                autoBtn.innerText = 'Adaptive Dynamic';
                qualityListWrapper.appendChild(autoBtn);
                return;
            }

            const autoBtn = document.createElement('button');
            autoBtn.className = 'quality-item-btn';
            autoBtn.id = 'quality-btn-auto';
            autoBtn.innerText = 'Auto (Adaptive)';
            if(player.getConfiguration().abr.enabled) autoBtn.classList.add('active');
            autoBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                player.configure({ abr: { enabled: true } });
                currentQualityLabel.innerText = 'Auto';
                qualityPopup.style.display = 'none';
                setActiveQualityClass('quality-btn-auto');
                resetMasterTimer();
            });
            qualityListWrapper.appendChild(autoBtn);

            let tracks = player.getVariantTracks();
            tracks.sort((a, b) => b.bandwidth - a.bandwidth);
            tracks.forEach(track => {
                const mbps = (track.bandwidth / 1000000).toFixed(1);
                let heightLabel = `${track.height}p`;
                if (track.height === 2160 || track.width === 3840) heightLabel = '4K (2160p)';
                const fps = Math.round(track.frameRate || 60);
                const btnText = `${heightLabel} - ${mbps} Mbps (${fps}fps)`;
                const btn = document.createElement('button');
                btn.className = 'quality-item-btn';
                btn.id = `track-${track.id}`;
                btn.innerText = btnText;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    player.configure({ abr: { enabled: false } });
                    player.selectVariantTrack(track, true);
                    currentQualityLabel.innerText = `${track.height}p`;
                    qualityPopup.style.display = 'none';
                    setActiveQualityClass(`track-${track.id}`);
                    resetMasterTimer();
                });
                qualityListWrapper.appendChild(btn);
            });
        }

        function updateActiveQualityButton() {
            if (hlsInstance) return;
            if (player.getConfiguration().abr.enabled) {
                setActiveQualityClass('quality-btn-auto');
                currentQualityLabel.innerText = 'Auto';
            } else {
                const tracks = player.getVariantTracks();
                const activeTrack = tracks.find(t => t.active);
                if (activeTrack) {
                    setActiveQualityClass(`track-${activeTrack.id}`);
                    currentQualityLabel.innerText = `${activeTrack.height}p`;
                }
            }
        }

        function setActiveQualityClass(activeId) {
            const buttons = qualityListWrapper.querySelectorAll('.quality-item-btn');
            buttons.forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(activeId);
            if (activeBtn) activeBtn.classList.add('active');
        }

        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            controlPanelElements: [ 'play_pause', 'mute', 'time_and_duration', 'spacer', 'picture_in_picture', 'fullscreen' ],
            addPlayPauseButton: true,
            seekBarColors: { base: 'rgba(255, 255, 255, 0.12)', buffered: 'rgba(255, 255, 255, 0.25)', played: 'rgb(225, 29, 72)' }
        });

        const shakaControls = document.querySelector('.shaka-controls-container');
        ui.getControls().addNativeContainerListener = function() {}; 

        const nukeShakaButtons = () => {
            const targets = document.querySelectorAll('.shaka-play-button-container, .shaka-scrim-container');
            targets.forEach(el => {
                el.style.setProperty('display', 'none', 'important');
                el.style.setProperty('width', '0px', 'important');
                el.style.setProperty('height', '0px', 'important');
                el.remove(); 
            });
        };
        setInterval(nukeShakaButtons, 300);

        function updateVideoInfo() {
            if (hlsInstance) {
                const is4K = video.videoWidth >= 3840 || video.videoHeight >= 2160;
                document.getElementById('metaRes').innerText = is4K ? '3840x2160 (4K UHD)' : `${video.videoWidth || 1920}x${video.videoHeight || 1080}`;
                document.getElementById('metaCodec').innerText = "AVC (H.264) / Main Profile";
                document.getElementById('metaHdr').innerText = "SDR (Standard Range)";
                document.getElementById('metaBitDepth').innerText = "8-bit Standard";
                document.getElementById('metaAudio').innerText = audioBoostMultiplier > 1.0 ? `Boosted Core (${Math.round(audioBoostMultiplier*100)}%)` : "AAC Stereo Master";
                document.getElementById('metaBandwidth').innerText = "Live HLS Streaming Engine";
                document.getElementById('metaFps').innerText = "60 FPS (Adaptive)";
                document.getElementById('metaEngine').innerText = "Hls.js Engine Native";
            } else if (player) {
                const stats = player.getStats();
                const tracks = player.getVariantTracks();
                const activeTrack = tracks.find(t => t.active);
                
                if (activeTrack) {
                    let heightLabel = `${activeTrack.height}p`;
                    if (activeTrack.height >= 2160 || activeTrack.width >= 3840) heightLabel = '4K UHD (2160p)';
                    document.getElementById('metaRes').innerText = `${activeTrack.width}x${activeTrack.height} (${heightLabel})`;
                    
                    let vCodec = activeTrack.videoCodec || '';
                    if (vCodec.includes('hvc1') || vCodec.includes('hev1')) {
                        document.getElementById('metaCodec').innerText = "HEVC (H.265) High Efficiency";
                        document.getElementById('metaBitDepth').innerText = "10-bit High Profile";
                        document.getElementById('metaHdr').innerText = "HDR10 / Wide Color Gamut";
                    } else if (vCodec.includes('avc1')) {
                        document.getElementById('metaCodec').innerText = "AVC (H.264) Standard";
                        document.getElementById('metaBitDepth').innerText = "8-bit Base Profile";
                        document.getElementById('metaHdr').innerText = "SDR (Standard Dynamic Range)";
                    } else {
                        document.getElementById('metaCodec').innerText = vCodec.toUpperCase() || "AVC (H.264)";
                        document.getElementById('metaBitDepth').innerText = "8-bit Standard";
                        document.getElementById('metaHdr').innerText = "SDR";
                    }

                    let aCodec = activeTrack.audioCodec || '';
                    let audioBaseText = "Dolby Digital Plus";
                    if (aCodec.includes('ec-3') || aCodec.includes('ac-3')) {
                        audioBaseText = "Dolby Digital Plus (E-AC-3)";
                    } else if (aCodec.includes('mp4a')) {
                        audioBaseText = "Advanced Audio Coding (AAC)";
                    }
                    document.getElementById('metaAudio').innerText = audioBoostMultiplier > 1.0 ? `${audioBaseText} + [Boost ${Math.round(audioBoostMultiplier*100)}%]` : audioBaseText;

                    document.getElementById('metaBandwidth').innerText = `${(activeTrack.bandwidth / 1000000).toFixed(2)} Mbps`;
                    document.getElementById('metaFps').innerText = `${Math.round(activeTrack.frameRate || 60)} FPS`;
                }
                if (stats) {
                    document.getElementById('metaEngine').innerText = "Shaka Core Production Engine";
                }
            }
        }

        player.addEventListener('variantchanged', updateVideoInfo);

        fitScreenBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentFitState = (currentFitState + 1) % 3;
            video.classList.remove('fit-contain', 'fit-stretch', 'fit-cover');
            
            if (currentFitState === 0) {
                video.classList.add('fit-contain');
                fitScreenLabel.innerText = "Fit";
            } else if (currentFitState === 1) {
                video.classList.add('fit-stretch');
                fitScreenLabel.innerText = "Stretch";
            } else if (currentFitState === 2) {
                video.classList.add('fit-cover');
                fitScreenLabel.innerText = "Zoom";
            }
            resetMasterTimer();
        });

        function showAllControls() {
            if (isLocked) {
                lockBtn.classList.add('touch-active');
                clearTimeout(stealthResetTimer);
                stealthResetTimer = setTimeout(() => { lockBtn.classList.remove('touch-active'); }, 2000);
                return;
            }
            controlsVisible = true;
            topLeftPanel.classList.remove('ui-hidden');
            if (shakaControls) shakaControls.classList.remove('ui-hidden');
            telegramLink.classList.remove('ui-hidden');
            if (video.paused) { coolPlayOverlay.classList.remove('ui-hidden'); } else { coolPlayOverlay.classList.add('ui-hidden'); }
        }

        function hideAllControls() {
            if (video.paused && !isLocked) return;
            controlsVisible = false;
            if (!isLocked) { topLeftPanel.classList.add('ui-hidden'); }
            if (shakaControls) shakaControls.classList.add('ui-hidden');
            telegramLink.classList.add('ui-hidden');
            coolPlayOverlay.classList.add('ui-hidden');
            serverPopup.style.display = 'none';
            qualityPopup.style.display = 'none';
            infoPopup.style.display = 'none';
        }

        function resetMasterTimer() {
            if (isLocked) return;
            clearTimeout(uiMasterTimer);
            if (!video.paused && infoPopup.style.display !== 'flex') { uiMasterTimer = setTimeout(hideAllControls, 4000); }
        }

        container.addEventListener('click', (e) => {
            if (isLocked) { showAllControls(); return; }
            if (serverPopup.style.display === 'flex' || qualityPopup.style.display === 'flex' || infoPopup.style.display === 'flex') {
                serverPopup.style.display = 'none';
                qualityPopup.style.display = 'none';
                infoPopup.style.display = 'none';
                resetMasterTimer();
                return;
            }
            if (!controlsVisible) { showAllControls(); resetMasterTimer(); } else { hideAllControls(); clearTimeout(uiMasterTimer); }
        });

        container.addEventListener('mousemove', () => { if (isLocked) return; if (!controlsVisible) showAllControls(); resetMasterTimer(); });
        container.addEventListener('touchmove', (e) => { if (isLocked) { e.preventDefault(); return; } if (!controlsVisible) showAllControls(); resetMasterTimer(); });

        autoSwitchToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            autoSwitchEnabled = !autoSwitchEnabled;
            if(autoSwitchEnabled) {
                autoSwitchToggle.className = "toggle-btn auto-on";
                autoSwitchToggle.innerHTML = '<span class="material-icons" style="font-size:10px;">sync</span> AUTO SWITCH: ON';
            } else {
                autoSwitchToggle.className = "toggle-btn auto-off";
                autoSwitchToggle.innerHTML = '<span class="material-icons" style="font-size:10px;">sync_disabled</span> AUTO SWITCH: OFF';
                stopFallbackTimer();
            }
            resetMasterTimer();
        });

        infoToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityPopup.style.display = 'none';
            updateVideoInfo();
            infoPopup.style.display = 'flex';
            clearTimeout(uiMasterTimer);
        });

        infoCloseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            infoPopup.style.display = 'none';
            resetMasterTimer();
        });

        function updateCoolPlayBtn() {
            if (video.paused) {
                coolPlayIcon.innerText = "play_arrow";
                if (controlsVisible && !isLocked) coolPlayOverlay.classList.remove('ui-hidden');
                clearTimeout(uiMasterTimer);
            } else {
                coolPlayOverlay.classList.add('ui-hidden');
                resetMasterTimer();
            }
        }

        coolPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (video.paused) { video.play(); } else { video.pause(); }
            resetMasterTimer();
        });

        if (shakaControls) shakaControls.addEventListener('click', (e) => { e.stopPropagation(); resetMasterTimer(); });
        topLeftPanel.addEventListener('click', (e) => { e.stopPropagation(); resetMasterTimer(); });
        serverPopup.addEventListener('click', (e) => { e.stopPropagation(); resetMasterTimer(); });
        qualityPopup.addEventListener('click', (e) => { e.stopPropagation(); resetMasterTimer(); });
        infoPopup.addEventListener('click', (e) => { e.stopPropagation(); });

        video.addEventListener('play', updateCoolPlayBtn);
        video.addEventListener('pause', updateCoolPlayBtn);

        window.getSafeServerIndex = function (currentServerIndex) {
            let nextIndex = parseInt(currentServerIndex, 10);
            if (isNaN(nextIndex)) { return 0; }
            return nextIndex;
        };

        async function loadServer(index) {
            if (!serverList || serverList.length === 0) return;
            let safeIdx = window.getSafeServerIndex(index);
            if (safeIdx >= serverList.length) safeIdx = 0;
            currentServerIndex = safeIdx;
            const currentServer = serverList[currentServerIndex];
            currentServerLabel.innerText = currentServer.name;

            statusText.innerText = `CONNECTING ${currentServer.name}...`;
            loader.style.opacity = '1';
            
            if (autoSwitchEnabled) startFallbackTimer();

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            const streamUrl = currentServer.url;

            if (streamUrl.includes('.ts') || streamUrl.includes('.m3u8')) {
                currentQualityLabel.innerText = 'HLS Live';
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({ 
                        maxBufferSize: 35 * 1000 * 1000, 
                        maxBufferLength: 25, 
                        liveSyncDurationCount: 3,
                        enableWorker: true,
                        lowLatencyMode: false,
                        abrEwmaDefaultEstimate: 12000000, 
                        appendErrorMaxRetry: 6
                    });
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(() => {});
                        generateQualityMenu();
                    });
                    hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal && autoSwitchEnabled) handleStreamFailure();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                }
            } else {
                try {
                    player.configure({ drm: { clearKeys: currentServer.clearKeys } });
                    await player.load(streamUrl);
                } catch (error) {
                    if (autoSwitchEnabled) handleStreamFailure();
                }
            }
            renderServerPopup();
        }

        function startFallbackTimer() {
            if(!autoSwitchEnabled) return;
            clearTimeout(fallbackTimer);
            fallbackTimer = setTimeout(() => { handleStreamFailure(); }, LOAD_TIMEOUT);
        }

        function stopFallbackTimer() { clearTimeout(fallbackTimer); }

        function handleStreamFailure() {
            stopFallbackTimer();
            if (!autoSwitchEnabled) { statusText.innerText = "BUFFERING (AUTO SWITCH OFF)..."; return; }
            let safeCurrent = window.getSafeServerIndex(currentServerIndex);
            let nextIndex = (safeCurrent + 1) % serverList.length;
            statusText.innerHTML = `<span style='color:#E11D48;'>TIMEOUT! SWITCHING TO SERVER ${nextIndex + 1}...</span>`;
            loader.style.opacity = '1';
            setTimeout(() => { loadServer(nextIndex); }, 2000);
        }

        video.addEventListener('playing', () => {
            loader.style.opacity = '0';
            stopFallbackTimer();
            updateCoolPlayBtn();
            showAllControls();
            resetMasterTimer();
            nukeShakaButtons();
            updateVideoInfo();
            initAudioBoostEngine();
        });

        video.addEventListener('waiting', () => {
            statusText.innerText = "BUFFERING...";
            loader.style.opacity = '1';
            if (autoSwitchEnabled) startFallbackTimer();
            clearTimeout(uiMasterTimer);
        });

        player.addEventListener('error', (event) => {
            if (autoSwitchEnabled && !hlsInstance) handleStreamFailure();
        });

        function renderServerPopup() {
            serverListWrapper.innerHTML = '';
            serverList.forEach((srv, idx) => {
                const btn = document.createElement('button');
                btn.className = 'server-item-btn';
                btn.innerText = srv.name;
                if(idx === currentServerIndex) btn.classList.add('active');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    serverPopup.style.display = 'none';
                    if(idx !== currentServerIndex) { loadServer(idx); }
                    resetMasterTimer();
                });
                serverListWrapper.appendChild(btn);
            });
        }

        const secureLoadSuccess = await fetchSecureServers();
        if (secureLoadSuccess && serverList.length > 0) {
            await loadServer(0);
        }

        serverMenuBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            qualityPopup.style.display = 'none';
            infoPopup.style.display = 'none';
            serverPopup.style.display = (serverPopup.style.display === 'flex') ? 'none' : 'flex';
            resetMasterTimer();
        });

        qualityMenuBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            serverPopup.style.display = 'none';
            infoPopup.style.display = 'none';
            qualityPopup.style.display = (qualityPopup.style.display === 'flex') ? 'none' : 'flex';
            resetMasterTimer();
        });

        lockBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            if (!isPlayerFullscreen) return;
            isLocked = !isLocked;
            if(isLocked) {
                container.classList.add('player-locked');
                lockIcon.innerText = 'lock';
                serverPopup.style.display = 'none';
                qualityPopup.style.display = 'none';
                infoPopup.style.display = 'none';
                hideAllControls();
                clearTimeout(uiMasterTimer);
            } else {
                container.classList.remove('player-locked');
                lockIcon.innerText = 'lock_open';
                lockBtn.classList.remove('touch-active');
                topLeftPanel.classList.remove('ui-hidden');
                showAllControls();
                resetMasterTimer();
            }
        });

        customFullscreenBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) { container.requestFullscreen(); } 
                else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
                fsIcon.innerText = 'fullscreen_exit';
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                fsIcon.innerText = 'fullscreen';
            }
            resetMasterTimer();
        });

        function checkFullscreenState() {
            if (document.fullscreenElement || window.innerHeight == screen.height) {
                isPlayerFullscreen = true;
                container.classList.add('is-fullscreen');
                fsIcon.innerText = 'fullscreen_exit';
                resetMasterTimer();
            } else {
                isPlayerFullscreen = false;
                isLocked = false;
                container.classList.remove('player-locked');
                container.classList.remove('is-fullscreen');
                lockIcon.innerText = 'lock_open';
                fsIcon.innerText = 'fullscreen';
                brightness = 100;
                document.getElementById('brightnessOverlay').style.opacity = 0;
                serverPopup.style.display = 'none';
                qualityPopup.style.display = 'none';
                infoPopup.style.display = 'none';
                controlsVisible = true;
                if (shakaControls) shakaControls.classList.remove('ui-hidden');
                topLeftPanel.classList.remove('ui-hidden');
                telegramLink.classList.remove('ui-hidden');
                updateCoolPlayBtn();
                clearTimeout(uiMasterTimer);
            }
            nukeShakaButtons();
        }

        document.addEventListener('fullscreenchange', checkFullscreenState);
        document.addEventListener('webkitfullscreenchange', checkFullscreenState);
        window.addEventListener('resize', checkFullscreenState);

        const bOverlay = document.getElementById('brightnessOverlay');
        const gOsd = document.getElementById('gestureOsd');
        const gIcon = document.getElementById('gestureIcon');
        const gValue = document.getElementById('gestureValue');
        let startX, startY, startVol, startBright, startGain;
        let osdTimeout;

        function showOSD(icon, value) {
            gIcon.innerText = icon;
            gValue.innerText = value;
            gOsd.style.opacity = '1';
            clearTimeout(osdTimeout);
            osdTimeout = setTimeout(() => { gOsd.style.opacity = '0'; }, 800);
        }

        container.addEventListener('touchstart', (e) => {
            if (!isPlayerFullscreen || isLocked || serverPopup.style.display === 'flex' || qualityPopup.style.display === 'flex' || infoPopup.style.display === 'flex') return;
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            startVol = video.volume;
            startBright = brightness;
            
            initAudioBoostEngine();
            startGain = gainNode ? gainNode.gain.value : 1.0;
            
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            resetMasterTimer();
        });

        container.addEventListener('touchmove', (e) => {
            if (!isPlayerFullscreen || isLocked || serverPopup.style.display === 'flex' || qualityPopup.style.display === 'flex' || infoPopup.style.display === 'flex') return;
            const touch = e.touches[0];
            const deltaY = startY - touch.clientY;
            const sensitivity = 0.35;
            const screenWidth = container.clientWidth;
            
            if (startX < screenWidth / 2) {
                let newBright = startBright + (deltaY * sensitivity);
                newBright = Math.max(10, Math.min(100, newBright));
                brightness = newBright;
                bOverlay.style.opacity = (100 - brightness) / 100 * 0.85;
                showOSD('brightness_6', Math.round(brightness) + '%');
            } else {
                // FIXED: Volume Mapping Dynamic Reset Rule Added
                if (startGain <= 1.05 && deltaY <= 0 && video.volume > 0) {
                    let newVol = startVol + (deltaY / 300);
                    newVol = Math.max(0, Math.min(1, newVol));
                    video.volume = newVol;
                    setAudioBoostLevel(1.0); 
                    showOSD(newVol === 0 ? 'volume_off' : 'volume_up', Math.round(newVol * 100) + '%');
                } else if (video.volume >= 0.99) {
                    let calculatedGain = startGain + (deltaY / 250);
                    let targetBoost = Math.max(1.0, Math.min(3.0, calculatedGain));
                    setAudioBoostLevel(targetBoost);
                    
                    if (targetBoost <= 1.01) {
                        showOSD('volume_up', '100%');
                    } else {
                        showOSD('volume_up', `Boost ${Math.round(targetBoost * 100)}% 🚀`);
                    }
                }
            }
            resetMasterTimer();
        });
    });
</script>
</body>
</html>
