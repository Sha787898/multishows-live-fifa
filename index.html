<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>FIFA WORLD CUP 2026 - Live</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
    <link href="https://unpkg.com/@videojs/themes@1.0.1/city/index.css" rel="stylesheet">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FMP9REY96D');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* --- PREMIUM WATERMARK CSS --- */
        .video-watermark {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 999;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
        }

        /* --- STYLISH OVERLAY --- */
        .custom-overlay {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99;
            pointer-events: none;
            display: none;
        }
        .msg-box {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            padding: 8px 20px;
            border-radius: 30px;
            color: #00ff88;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* UI Theme Fixes */
        .vjs-theme-city .vjs-play-progress { background: #0088ff !important; }
        .vjs-theme-city .vjs-volume-level { background: #0088ff !important; }
        .vjs-theme-city .vjs-big-play-button { 
            background: rgba(0, 136, 255, 0.8) !important; 
            border-radius: 50% !important;
            width: 60px !important; height: 60px !important;
            line-height: 60px !important; margin-top: -30px !important; margin-left: -30px !important;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="video-watermark">MultiShows</div>

        <div id="statusOverlay" class="custom-overlay">
            <div id="statusText" class="msg-box">LOADING...</div>
        </div>

        <video id="my-video" class="video-js vjs-theme-city vjs-big-play-centered" controls autoplay playsinline preload="auto" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/videojs-contrib-eme@5.4.1/dist/videojs-contrib-eme.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = videojs('my-video', {
                autoplay: true,
                controls: true,
                responsive: true,
                loadingSpinner: true
            });

            // EME Plugin Initialize
            player.eme();

            // --- CORRECT VIDEO.JS CLEARKEY SYNTAX ---
            const drmConfig = {
                "org.w3.clearkey": {
                    // Video.js-এ ক্লিয়ারকি সেট করার আসল নিয়ম হলো clearkeys অবজেক্ট পাস করা
                    clearkeys: {
                        "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050"
                    }
                }
            };

            const streamUrl = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";

            player.src({
                src: streamUrl,
                type: 'application/dash+xml',
                keySystems: drmConfig
            });

            const overlay = document.getElementById('statusOverlay');
            const statusText = document.getElementById('statusText');

            player.on('waiting', () => {
                statusText.innerText = "BUFFERING, PLEASE WAIT...";
                statusText.style.color = "#00ff88";
                statusText.style.borderColor = "rgba(0, 255, 136, 0.3)";
                overlay.style.display = "block";
            });

            player.on('playing', () => { overlay.style.display = "none"; });
            player.on('canplay', () => { overlay.style.display = "none"; });

            player.on('error', () => {
                // পুরানো বা এক্সপায়ার্ড লিংকের জন্য এরর হ্যান্ডলিং
                statusText.innerText = "STREAM ERROR / EXPIRED";
                statusText.style.color = "#E11D48";
                statusText.style.borderColor = "rgba(225, 29, 72, 0.3)";
                overlay.style.display = "block";
            });
        });
    </script>
</body>
</html>
