<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>MultiShows Ultimate Player</title>     
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FMP9REY96D');
    </script>

    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }  
        html, body {  
            background: #000;  
            height: 100%;  
            width: 100%;  
            overflow: hidden;  
            font-family: system-ui, -apple-system, sans-serif;  
        }  
        .shaka-video-container {  
            position: relative;  
            width: 100%;  
            height: 100vh;  
            touch-action: none;
        }  
        video {  
            width: 100%;  
            height: 100%;  
            background: #000;  
            object-fit: contain;  
        }  

        /* --- BRIGHTNESS FILTER OVERLAY --- */
        #brightnessOverlay {
            position: absolute;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        /* --- PREMIUM WATERMARK --- */
        .video-watermark {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        /* --- SMART AUTO-HIDE LOCK BUTTON --- */
        .player-lock-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            opacity: 0; /* শুরুতে এবং কন্ট্রোল বার হাইড থাকলে এটি অদৃশ্য থাকবে */
            pointer-events: none;
            transition: opacity 0.2s ease, background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .player-lock-btn span { font-size: 20px; }
        
        /* কন্ট্রোল বার যখন একটিভ (শো) হবে, তখন বাটন দেখাবে */
        .shaka-controls-container[show-controls="true"] ~ .player-lock-btn {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* লক করা অবস্থায় বাটনটিকে অলওয়েজ ভিজিবল রাখা (যেন ইউজার আনলক করতে পারে) */
        .player-locked .player-lock-btn {
            opacity: 1 !important;
            pointer-events: auto !important;
            background: #E11D48 !important; /* লক অবস্থায় প্রিমিয়াম রেড বাটন */
            border-color: #E11D48 !important;
        }

        /* লক করা থাকলে শাকা প্লেয়ারের বাকি সব কন্ট্রোল এবং টাচ জেস্টার পুরোপুরি লকড */
        .player-locked .shaka-controls-container { display: none !important; }
        .player-locked .gesture-area { pointer-events: none !important; }

        /* --- GESTURE OSD INDICATORS --- */
        .gesture-indicator {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 99;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            border: 1px solid rgba(225, 29, 72, 0.3);
            backdrop-filter: blur(5px);
        }

        /* --- RED BRANDING THEME OVERRIDES --- */
        .shaka-overflow-menu, .shaka-settings-menu {
            background: rgba(15, 15, 15, 0.95) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(225, 29, 72, 0.3) !important;
            border-radius: 10px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
        }
        .shaka-overflow-menu span, .shaka-settings-menu span, .shaka-overflow-menu button, .shaka-settings-menu button {
            color: #ffffff !important;
            font-weight: 600 !important;
        }
        .shaka-overflow-menu button:hover, .shaka-settings-menu button:hover {
            background: rgba(225, 29, 72, 0.25) !important;
            color: #E11D48 !important;
        }
        
        /* Neon Red Progress Bars */
        .shaka-volume-bar-container .shaka-volume-bar-level { background: #E11D48 !important; }
        .shaka-seek-bar-container .shaka-seek-bar-played { background: #E11D48 !important; box-shadow: 0 0 8px #E11D48; }
        
        /* Loader Box */
        .custom-loader {
            position: absolute;
            bottom: 85px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 9;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-text {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            padding: 8px 20px;
            border-radius: 30px;
            color: #E11D48;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(225, 29, 72, 0.25);
        }
        .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg { display: none !important; }  
    </style>  
</head>  
<body>  

    <div class="shaka-video-container" data-shaka-player-container id="playerContainer">  
        <div id="brightnessOverlay"></div>

        <div class="video-watermark">MultiShows</div>

        <div id="gestureOsd" class="gesture-indicator">
            <span class="material-icons" id="gestureIcon">volume_up</span>
            <span id="gestureValue">50%</span>
        </div>

        <div id="loadingOverlay" class="custom-loader">
            <div id="statusText" class="loading-text">LOADING...</div>
        </div>

        <video autoplay playsinline id="video" class="shaka-video" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>  
        
        <button class="player-lock-btn" id="lockBtn">
            <span class="material-icons" id="lockIcon">lock_open</span>
        </button>
    </div>  
  
    <script>  
        let isLocked = false;
        let brightness = 100; 

        document.addEventListener('DOMContentLoaded', async () => {  
            shaka.polyfill.installAll();  
            if (!shaka.Player.isBrowserSupported()) return;  
        
            const video = document.getElementById('video');  
            const container = document.getElementById('playerContainer');  
            const loader = document.getElementById('loadingOverlay');
            const statusText = document.getElementById('statusText');
            const lockBtn = document.getElementById('lockBtn');
            const lockIcon = document.getElementById('lockIcon');
            
            const player = new shaka.Player(video);  
            const ui = new shaka.ui.Overlay(player, container, video);  
        
            ui.configure({  
                controlPanelElements: [  
                    'play_pause', 'time_and_duration', 'mute', 'volume',  
                    'spacer', 'language', 'captions', 'picture_in_picture',  
                    'quality', 'fullscreen'  
                ],  
                volumeBarColors: { base: 'rgba(225, 29, 72, 0.2)', level: 'rgb(225, 29, 72)' },  
                seekBarColors: { base: 'rgba(255, 255, 255, 0.15)', buffered: 'rgba(255, 255, 255, 0.3)', played: 'rgb(225, 29, 72)' }
            });  
        
            let drmConfig = {  
                clearKeys: {  
                    "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050"  
                }
            };  
        
            let streamUrl = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";  
        
            player.configure({  
                drm: drmConfig,  
                streaming: {  
                    lowLatencyMode: true,  
                    bufferingGoal: 12,  
                    rebufferingGoal: 2.5,  
                    bufferBehind: 10,
                    crossOrigin: 'anonymous'
                }  
            });  
        
            video.addEventListener('playing', () => { loader.style.opacity = '0'; });
            video.addEventListener('waiting', () => { statusText.innerText = "BUFFERING..."; loader.style.opacity = '1'; });

            player.addEventListener('error', (event) => {  
                statusText.innerHTML = "<span style='color:#E11D48;'>STREAM OFFLINE / EXPIRED</span>";
                loader.style.opacity = '1';
            });  
        
            try {  
                await player.load(streamUrl);  
            } catch (error) {
                statusText.innerHTML = "<span style='color:#E11D48;'>FAILED TO LOAD STREAM</span>";
                loader.style.opacity = '1';
            }  

            // --- LOCK SCREEN LOGIC WITH AUTO-HIDE INTEGRATION ---
            lockBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isLocked = !isLocked;
                if(isLocked) {
                    container.classList.add('player-locked');
                    lockIcon.innerText = 'lock';
                } else {
                    container.classList.remove('player-locked');
                    lockIcon.innerText = 'lock_open';
                    
                    // আনলক করার পর কন্ট্রোল বার যেন তাৎক্ষণিকভাবে সচল হয়
                    const controls = document.querySelector('.shaka-controls-container');
                    if (controls) {
                        controls.setAttribute('show-controls', 'true');
                    }
                }
            });

            // --- ADVANCED SLIDE GESTURES (SOUND & BRIGHTNESS) ---
            const bOverlay = document.getElementById('brightnessOverlay');
            const gOsd = document.getElementById('gestureOsd');
            const gIcon = document.getElementById('gestureIcon');
            const gValue = document.getElementById('gestureValue');

            let startX, startY, startVol, startBright;
            let osdTimeout;

            function showOSD(icon, value) {
                gIcon.innerText = icon;
                gValue.innerText = value;
                gOsd.style.opacity = '1';
                clearTimeout(osdTimeout);
                osdTimeout = setTimeout(() => { gOsd.style.opacity = '0'; }, 800);
            }

            container.addEventListener('touchstart', (e) => {
                if (isLocked) return;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                startVol = video.volume;
                startBright = brightness;
            });

            container.addEventListener('touchmove', (e) => {
                if (isLocked) return;
                const touch = e.touches[0];
                const deltaY = startY - touch.clientY; 
                const sensitivity = 0.4; 

                const screenWidth = container.clientWidth;
                
                if (startX < screenWidth / 2) {
                    let newBright = startBright + (deltaY * sensitivity);
                    newBright = Math.max(10, Math.min(100, newBright)); 
                    brightness = newBright;
                    bOverlay.style.opacity = (100 - brightness) / 100 * 0.85; 
                    showOSD('brightness_6', Math.round(brightness) + '%');
                } 
                else {
                    let newVol = startVol + (deltaY / 300); 
                    newVol = Math.max(0, Math.min(1, newVol));
                    video.volume = newVol;
                    showOSD(newVol === 0 ? 'volume_off' : 'volume_up', Math.round(newVol * 100) + '%');
                }
            });
        });  
    </script>  
</body>  
</html>
